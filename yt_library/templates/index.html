          return;
        }
        title.textContent = displayVideoTitle(video);
        meta.innerHTML = `
          ${video.video_id ? `<span>${escapeHtml(video.video_id)}</span>` : ''}
          ${video.watch_count ? `<span>${escapeHtml(video.watch_count)} ${Number(video.watch_count) === 1 ? 'watch' : 'watches'}</span>` : ''}
        `;
        grid.replaceChildren(videoDetailCardFor(video));
        empty.hidden = true;
        return;
      }
      if (selected.startsWith('__channel__:')) {
        const channelId = selected.slice('__channel__:'.length);
        const channel = channelById(channelId);
        if (!channel) {
          title.textContent = 'Channel not found';
          meta.textContent = channelId;
          grid.replaceChildren();
          empty.hidden = false;
          empty.textContent = 'No local metadata is available for this channel.';
          return;
        }
        title.textContent = channel.title || channel.channel_id;
        const playlistRows = channelVideoRows(channelId);
        const historyCount = cachedChannelHistoryCount(channelId);
        viewContext.hidden = false;
        viewContext.replaceChildren(channelDetailCardFor(channel), channelTabsFor(channelDetailTab, playlistRows.length, historyCount));
        grid.className = channelDetailTab === 'history' ? 'history-list' : 'grid';
        if (channelDetailTab === 'history') {
          meta.textContent = 'Loading channel history...';
          grid.replaceChildren();
          empty.hidden = true;
          const payload = await fetchHistoryPage(channelId);
          const rows = payload.watch || [];
          const total = Number(payload.totals?.filtered_watch_rows ?? payload.totals?.watch_rows ?? rows.length);
          viewContext.replaceChildren(channelDetailCardFor(channel), channelTabsFor('history', playlistRows.length, total));
          const pageInfo = remotePageInfo(total, rows.length);
          meta.textContent = '';
          renderPager(pageInfo);
          grid.replaceChildren(...rows.map(historyRowCardFor));
          empty.hidden = rows.length !== 0;
          empty.textContent = 'No history rows match this channel.';
        } else {
          const pageInfo = pagedRows(playlistRows);
          meta.textContent = '';
          grid.replaceChildren(...pageInfo.pageRows.map(playlistVideoCardFor));
          empty.hidden = playlistRows.length !== 0;
          empty.textContent = 'No playlist videos match this channel.';
          if (historyCount === null) {
            void fetchChannelHistoryCount(channelId).then(() => {
              if (selected === channelSelection(channelId) && channelDetailTab === 'playlists') render();
            }).catch(() => {});
          }
        }
        return;
      }
      if (selected === '__search__') {
        if (!query) {
          title.textContent = 'Search';
          meta.textContent = '';
          grid.replaceChildren();
          empty.hidden = false;
          empty.textContent = 'Enter a search query.';
          return;
        }
        title.textContent = 'Searching';
        meta.textContent = '';
        showSearchProgress();
        await new Promise(resolve => requestAnimationFrame(resolve));
        if (generation !== renderGeneration) return;
        let allRows;
        try {
          allRows = await buildOmniResults(query);
        } catch (error) {
          if (generation !== renderGeneration) return;
          stopSearchProgress();
          title.textContent = 'Search unavailable';
          empty.hidden = false;
          empty.textContent = error.message;
          return;
        }
        if (generation !== renderGeneration) return;
        stopSearchProgress();
        const rows = sortedSearchResults(dedupeSearchVideoResults(filterSearchResultsByAvailability(allRows))).slice(0, 500);
        title.textContent = 'Search results';
        meta.innerHTML = `
          <span>${rows.length} shown</span>
          ${searchResultsSortHtml()}
        `;
        renderPagedGrid(rows, searchResultCardFor, 'No results match.');
        return;
      }
      if (selected.startsWith('__playlist__:')) {
        const playlistId = selected.slice('__playlist__:'.length);
        resetPlaylistVisibilityFor(playlistId);
        const playlist = playlists.get(playlistId);
        if (!playlist) {
          title.textContent = 'Playlist not found';
          meta.textContent = playlistId;
          grid.replaceChildren();
          empty.hidden = false;
          return;
        }
        const allRows = (playlistVideos.get(playlistId) || []).filter(video => {
          const haystack = `${video.title} ${video.channel} ${video.availability} ${video.video_id}`.toLowerCase();
          return !query || haystack.includes(query);
        }).filter(video => {
          const playlistQuery = playlistPageSearch.trim().toLowerCase();
          if (!playlistQuery) return true;
          const haystack = [
            video.title,
            video.metadata_title,
            video.current_title,
            video.recovered_title,
            video.metadata_description,
            video.recovered_description,
          ].join(' ').toLowerCase();
          return haystack.includes(playlistQuery);
        });
        const videoCount = allRows.filter(video => !isUnavailablePlaylistVideo(video)).length;
        const hiddenCount = allRows.length - videoCount;
        const rows = sortedPlaylistVideos(allRows.filter(video => {
          const unavailable = isUnavailablePlaylistVideo(video);
          return unavailable ? playlistVisibility.unavailable : playlistVisibility.videos;
        }), playlistViewSort);
        title.innerHTML = `
          <span class="title-with-action">
            <span>${escapeHtml(playlist.title)}</span>
            ${playlist.url ? `<a class="external-link" href="${escapeHtml(playlist.url)}" target="_blank" rel="noreferrer" title="Open on YouTube" aria-label="Open ${escapeHtml(playlist.title)} on YouTube">${externalLinkSvg()}</a>` : ''}
          </span>
        `;
        meta.innerHTML = `
          <input class="playlist-search" type="search" data-playlist-page-search placeholder="Search this playlist" autocomplete="off" value="${escapeHtml(playlistPageSearch)}">
          <label class="meta-filter"><input type="checkbox" data-playlist-filter="videos" ${playlistVisibility.videos ? 'checked' : ''}> <span>${videoCount} videos</span></label>
          <label class="meta-filter"><input type="checkbox" data-playlist-filter="unavailable" ${playlistVisibility.unavailable ? 'checked' : ''}> <span class="badge">${hiddenCount} unavailable</span></label>
          ${videoSortHtml(playlistViewSort, 'playlist')}
        `;
        renderPagedGrid(rows, video => playlistVideoCardFor(video, { showPosition: true }), playlist.scanned_at ? 'No videos match.' : 'This playlist has not been scanned yet.');
        return;
      }
      if (selected === '__all_videos__') {
        resetPlaylistVisibilityFor('__all_videos__');
        const allRows = allPlaylistVideos().filter(video => isUnavailablePlaylistVideo(video) || hasActivePlaylistLink(video));
        const hiddenCount = allRows.filter(isUnavailablePlaylistVideo).length;
        const videoCount = allRows.length - hiddenCount;
        const rows = sortedPlaylistVideos(allRows.filter(video => {
          const unavailable = isUnavailablePlaylistVideo(video);
          return unavailable ? playlistVisibility.unavailable : playlistVisibility.videos;
        }), allVideosSort);
        title.textContent = 'Playlist videos';
        meta.innerHTML = `
          <label class="meta-filter"><input type="checkbox" data-playlist-filter="videos" ${playlistVisibility.videos ? 'checked' : ''}> <span>${videoCount} videos</span></label>
          <label class="meta-filter"><input type="checkbox" data-playlist-filter="unavailable" ${playlistVisibility.unavailable ? 'checked' : ''}> <span class="badge">${hiddenCount} unavailable</span></label>
          ${videoSortHtml(allVideosSort, 'all')}
        `;
        renderPagedGrid(rows, playlistVideoCardFor, 'No playlist videos match.');
        return;
      }
      if (selected === '__history__') {
        await renderHistoryView();
        return;
      }
      if (selected === '__hidden__') {
        title.textContent = 'Unavailable videos';
        const rows = data.unavailableVideos.filter(video => {
          const haystack = `${video.title} ${video.channel} ${video.availability} ${video.playlist_title} ${video.video_id}`.toLowerCase();
          return !query || haystack.includes(query);
        });
        meta.textContent = `${rows.length} shown`;
        renderPagedGrid(rows, hiddenVideoCardFor, 'No unavailable videos match.');
        return;
      }
      if (selected === '__liked__') {
        title.textContent = 'Liked videos';
        const rows = likedVideos().filter(video => {
          const haystack = `${displayVideoTitle(video)} ${displayVideoChannel(video)} ${video.metadata_description} ${video.playlist_title} ${video.video_id}`.toLowerCase();
          return !query || haystack.includes(query);
        });
        meta.textContent = `${rows.length} videos`;
        renderPagedGrid(rows, playlistVideoCardFor, 'No liked videos have been captured yet.');
        return;
      }
      if (selected === '__channels__') {
        title.textContent = 'Channels';
        const allRows = (data.channels || []).filter(channel => {
          const haystack = `${channel.title} ${channel.channel_id} ${channel.url} ${channel.aliases} ${channel.description} ${channel.status} ${channel.status_reason}`.toLowerCase();
          return !query || haystack.includes(query);
        });
        const subscribedCount = allRows.filter(channel => channelVisibilityCategory(channel) === 'subscribed').length;
        const nonSubscribedCount = allRows.filter(channel => channelVisibilityCategory(channel) === 'non_subscribed').length;
        const terminatedCount = allRows.filter(channel => channelVisibilityCategory(channel) === 'terminated').length;
        const rows = sortedChannels(allRows.filter(channel => channelVisibility[channelVisibilityCategory(channel)]));
        meta.innerHTML = `
          <label class="meta-filter"><input type="checkbox" data-channel-filter="subscribed" ${channelVisibility.subscribed ? 'checked' : ''}> <span>${subscribedCount} subscribed</span></label>
          <label class="meta-filter"><input type="checkbox" data-channel-filter="non_subscribed" ${channelVisibility.non_subscribed ? 'checked' : ''}> <span>${nonSubscribedCount} non-subscribed</span></label>
          <label class="meta-filter"><input type="checkbox" data-channel-filter="terminated" ${channelVisibility.terminated ? 'checked' : ''}> <span class="badge">${terminatedCount} terminated</span></label>
          ${channelSortHtml()}
        `;
        renderPagedGrid(rows, channelCardFor, 'No channels match.');
        return;
      }
      if (selected === '__subscribed_channels__') {
        title.textContent = 'Subscribed channels';
        const rows = (data.channels || [])
          .filter(isSubscribedChannel)
          .filter(channel => {
            const haystack = `${channel.title} ${channel.channel_id} ${channel.url} ${channel.aliases} ${channel.description} ${channel.status} ${channel.status_reason}`.toLowerCase();
            return !query || haystack.includes(query);
          });
        meta.textContent = `${rows.length} channels`;
        renderPagedGrid(rows, channelCardFor, 'No subscribed channels match.');
        return;
      }
      if (selected === '__terminated_channels__') {
        title.textContent = 'Terminated channels';
        const rows = (data.channels || [])
          .filter(isTerminatedChannel)
          .filter(channel => {
            const haystack = `${channel.title} ${channel.channel_id} ${channel.url} ${channel.aliases} ${channel.description} ${channel.status} ${channel.status_reason}`.toLowerCase();
            return !query || haystack.includes(query);
          });
        meta.textContent = `${rows.length} channels`;
        renderPagedGrid(rows, channelCardFor, 'No terminated channels match.');
        return;
      }
      if (selected === '__unavailable_playlists__') {
        title.textContent = 'Playlists with unavailable videos';
        const rows = data.playlists
          .filter(playlist => (playlist.unavailable_count || 0) > 0)
          .filter(playlist => {
            const haystack = playlistSearchText(playlist).toLowerCase();
            return !query || haystack.includes(query);
          })
          .sort((a, b) =>
            (b.unavailable_count || 0) - (a.unavailable_count || 0)
            || a.title.localeCompare(b.title, undefined, { sensitivity: 'base' })
          );
        meta.textContent = `${rows.length} playlists`;
        renderPagedGrid(rows, cardFor, 'No playlists with unavailable videos match.');
        return;
      }
      if (selected === '') {
        title.textContent = 'All playlists';
        const allRows = data.playlists || [];
        const privateCount = allRows.filter(playlist => playlistVisibilityCategory(playlist) === 'private').length;
        const publicCount = allRows.filter(playlist => playlistVisibilityCategory(playlist) === 'public').length;
        const unlistedCount = allRows.filter(playlist => playlistVisibilityCategory(playlist) === 'unlisted').length;
        const othersCount = allRows.filter(playlist => playlistVisibilityCategory(playlist) === 'others').length;
        const unknownCount = allRows.filter(playlist => playlistVisibilityCategory(playlist) === 'unknown').length;
        const rows = sortedPlaylists(allRows.filter(playlist => playlistListVisibility[playlistVisibilityCategory(playlist)]));
        meta.innerHTML = `
          <label class="meta-filter"><input type="checkbox" data-playlist-visibility-filter="private" ${playlistListVisibility.private ? 'checked' : ''}> ${visibilityFilterLabelHtml('private', privateCount)}</label>
          <label class="meta-filter"><input type="checkbox" data-playlist-visibility-filter="public" ${playlistListVisibility.public ? 'checked' : ''}> ${visibilityFilterLabelHtml('public', publicCount)}</label>
          <label class="meta-filter"><input type="checkbox" data-playlist-visibility-filter="unlisted" ${playlistListVisibility.unlisted ? 'checked' : ''}> ${visibilityFilterLabelHtml('unlisted', unlistedCount)}</label>
          <label class="meta-filter"><input type="checkbox" data-playlist-visibility-filter="others" ${playlistListVisibility.others ? 'checked' : ''}> <span>${othersCount} others</span></label>
          <label class="meta-filter"><input type="checkbox" data-playlist-visibility-filter="unknown" ${playlistListVisibility.unknown ? 'checked' : ''}> <span>${unknownCount} unknown</span></label>
          ${playlistSortHtml()}
        `;
        renderPagedGrid(rows, cardFor, 'No playlists match the selected visibility filters.');
        return;
      }
      const group = data.groups.find(g => g.group_key === selected);
      title.textContent = group ? group.name : 'All playlists';
      const ids = groupPlaylistIds(selected);
      const rows = ids.map(id => playlists.get(id)).filter(Boolean).filter(p => {
        const haystack = playlistSearchText(p).toLowerCase();
        return !query || haystack.includes(query);
      });
      meta.textContent = `${rows.length} shown`;
      renderPagedGrid(rows, cardFor, 'No playlists match.');
    }

    function cardFor(playlist, options = {}) {
      const article = document.createElement('article');
      article.className = 'card';
      const localHref = localPlaylistHref(playlist.playlist_id);
      const playlistCount = playlistVideoCountLabel(playlist);
      const owner = playlistOwnerHtml(playlist);
      const thumbLink = document.createElement('a');
      thumbLink.className = 'thumb-link';
      thumbLink.href = localHref;
      if (playlist.thumbnail_path) {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.loading = 'lazy';
        img.alt = '';
        img.src = `/${playlist.thumbnail_path}`;
        thumbLink.append(img);
      } else {
        const placeholder = document.createElement('div');
        placeholder.className = 'thumb';
        placeholder.setAttribute('aria-hidden', 'true');
        thumbLink.append(placeholder);
      }
      const body = document.createElement('div');
      body.className = 'body';
      body.innerHTML = `
        ${options.resultKind ? `<div class="result-kind">${escapeHtml(options.resultKind)}</div>` : ''}
        <div class="title-row">
          <a class="playlist-title" href="${localHref}">${escapeHtml(playlist.title)}</a>
          <a class="external-link" href="${playlist.url}" target="_blank" rel="noreferrer" title="Open on YouTube" aria-label="Open ${escapeHtml(playlist.title)} on YouTube">
            ${externalLinkSvg()}
          </a>
        </div>
        <div class="details">
          ${playlistCount ? `<span>${escapeHtml(playlistCount)}</span>` : ''}
          ${playlist.unavailable_count ? `<span class="badge">${playlist.unavailable_count} unavailable</span>` : ''}
          ${playlistVisibilityLabelHtml(playlist)}
          ${playlist.fetch_status === 'error' ? '<span class="status">Fetch failed</span>' : ''}
        </div>
        ${owner ? `<div class="details">${owner}</div>` : ''}
        <div class="details">
          ${playlist.playlist_id ? `<span>${escapeHtml(playlist.playlist_id)}</span>` : ''}
        </div>
      `;
      article.append(thumbLink, body);
      return article;
    }

    function playlistVideoCountLabel(playlist) {
      const reported = Number(playlist.video_count || 0);
      const scanned = Number(playlist.scanned_video_count || 0);
      const count = reported || scanned;
      if (!count) return '';
      const incomplete = Boolean(
        playlist.scan_status === 'error'
        || (reported && scanned && reported !== scanned)
      );
      return `${count} videos${incomplete ? ' (incomplete)' : ''}`;
    }

    function playlistOwnerHtml(playlist) {
      const owner = playlistOwnerForDisplay(playlist);
      const name = cleanPlaylistOwnerName(owner.title || '');
      if (!name) return '';
      const href = owner.channel_id
        ? localChannelHref(owner.channel_id)
        : (owner.url || '');
      return creatorHtml(owner.thumbnail_path || '', name, href);
    }

    function playlistOwnerForDisplay(playlist) {
      const title = playlist.owner_channel_title || '';
      if (title) {
        return {
          title,
          channel_id: playlist.owner_channel_id || '',
          url: playlist.owner_channel_url || '',
          thumbnail_path: playlist.owner_channel_thumbnail_path || '',
        };
      }
      const visibility = String(playlist.visibility || '').trim();
      if (!visibility) return {};
      return libraryOwnerChannelForDisplay();
    }

    function libraryOwnerChannelForDisplay() {
      const counts = new Map();
      for (const playlist of data.playlists || []) {
        if (!Number(playlist.is_library_owner || 0) || !playlist.owner_channel_id) continue;
        counts.set(playlist.owner_channel_id, (counts.get(playlist.owner_channel_id) || 0) + 1);
      }
      let bestId = '';
      let bestCount = 0;
      for (const [channelId, count] of counts.entries()) {
        if (count > bestCount) {
          bestId = channelId;
          bestCount = count;
        }
      }
      const channel = bestId ? channels.get(bestId) : null;
      if (!channel) return {};
      return {
        title: channel.title || '',
        channel_id: channel.channel_id || '',
        url: channel.url || '',
        thumbnail_path: channel.thumbnail_path || '',
      };
    }

    function cleanPlaylistOwnerName(value) {
      const text = String(value || '').trim();
      return text.toLowerCase().startsWith('by ') ? text.slice(3).trim() : text;
    }

    function playlistSearchText(playlist) {
      return [
        playlist.title,
        playlist.owner_channel_title,
        playlist.owner_channel_id,
        playlist.owner_channel_url,
        playlist.visibility,
        playlist.description,
        playlist.playlist_id,
      ].join(' ');
    }

    function detailRowHtml(items, className = 'details') {
      const filtered = items.filter(Boolean);
      return filtered.length ? `<div class="${className}">${filtered.join('')}</div>` : '';
    }

    function badgeRowsHtml(badges) {
      return detailRowHtml(
        badges
          .filter(badge => badge && badge.label)
          .map(badge => {
            const title = badge.title ? ` title="${escapeHtml(badge.title)}"` : '';
            return `<span class="badge"${title}>${escapeHtml(badge.label)}</span>`;
          }),
        'details badge-lines'
      );
    }

    function videoCardFor(options) {
      const article = document.createElement('article');
      article.className = 'card';
      if (options.thumbnailPath) {
        article.append(thumbnailWithProgress(options.thumbnailPath, options.progressVideo || {}));
      }
      const body = document.createElement('div');
      body.className = 'body';
      const localTitleHtml = options.localUrl
        ? `<a class="playlist-title" href="${escapeHtml(options.localUrl)}">${escapeHtml(options.title)}</a>`
        : '';
      const externalTitleHtml = options.externalUrl
        ? `<a class="external-link" href="${escapeHtml(options.externalUrl)}" target="_blank" rel="noreferrer" title="Open on YouTube" aria-label="Open ${escapeHtml(options.title)} on YouTube">${externalLinkSvg()}</a>`
        : '';
      const titleHtml = (localTitleHtml || externalTitleHtml)
        ? `<div class="title-row">${localTitleHtml || `<div class="video-title">${escapeHtml(options.title)}</div>`}${externalTitleHtml}</div>`
        : `<div class="video-title">${escapeHtml(options.title)}</div>`;
      body.innerHTML = `
        ${options.resultKind ? `<div class="result-kind">${escapeHtml(options.resultKind)}</div>` : ''}
        ${options.position ? `<div class="position">#${escapeHtml(options.position)}</div>` : ''}
        ${titleHtml}
        ${badgeRowsHtml(options.badges || [])}
        ${options.channelHtml ? `<div class="details">${options.channelHtml}</div>` : ''}
        ${detailRowHtml(options.details || [])}
        ${options.watchedHtml || ''}
        ${options.sparklineHtml || ''}
        ${options.reactionHtml || ''}
        ${options.description ? `<div class="description">${escapeHtml(options.description)}</div>` : ''}
        ${detailRowHtml(options.sources || [])}
        ${options.playlistSourcesHtml || ''}
      `;
      article.append(body);
      return article;
    }

    function playlistVideoCardFor(video, options = {}) {
      const watchUrl = youtubeWatchUrl(video);
      const channelName = displayVideoChannel(video);
      const channelUrl = displayVideoChannelLocalUrl(video);
      return videoCardFor({
        thumbnailPath: video.metadata_thumbnail_path,
        progressVideo: video,
        resultKind: options.resultKind,
        position: options.showPosition ? video.position : '',
        title: displayVideoTitle(video),
        localUrl: video.video_id ? localVideoHref(video.video_id) : '',
        externalUrl: watchUrl,
        badges: [
          { label: unavailableLabel(video) },
          { label: archivarixStatusLabel(video) },
          { label: wasRemovedByMeFromPlaylist(video) ? 'Removed' : '' },
          { label: matchTypeLabel(video), title: video.match_note },
        ],
        details: [
          displayVideoDuration(video) ? `<span>${escapeHtml(displayVideoDuration(video))}</span>` : '',
          video.video_id ? `<span>${escapeHtml(video.video_id)}</span>` : '',
          archivarixLinkHtml(video),
        ],
        channelHtml: creatorHtml(video.metadata_channel_thumbnail_path, channelName, channelUrl),
        sources: options.sources || [],
        playlistSourcesHtml: options.playlistSourcesHtml === undefined ? playlistSourceLinksHtml(video) : options.playlistSourcesHtml,
        watchedHtml: watchedLineHtml(video),
        sparklineHtml: watchSparklineHtml(video),
        reactionHtml: reactionIconsHtml(video),
        description: video.metadata_description,
      });
    }

    function historyWatchedAtLabel(video) {
      if (video.time_quality === 'exact' && video.watched_at) {
        return window.YTLibraryTime.format(video.watched_at);
      }
      return video.watch_date || '';
    }

    function historyRowCardFor(video) {
      const article = playlistVideoCardFor(video, {
        playlistSourcesHtml: playlistSourceLinksHtml(video),
      });
      article.classList.add('history-row');
      if (!article.querySelector('.thumb-wrap')) {
        const placeholder = document.createElement('div');
        placeholder.className = 'thumb-wrap';
        article.insertBefore(placeholder, article.firstChild);
      }
      const body = article.querySelector('.body');
      if (body) {
        const watched = historyWatchedAtLabel(video);
        if (watched) {
          const line = document.createElement('div');
          line.className = 'details';
          line.innerHTML = `<span>Watched ${escapeHtml(watched)}</span>`;
          body.insertBefore(line, body.querySelector('.watched-line') || body.querySelector('.watch-sparkline') || null);
        }
      }
      return article;
    }

    function searchResultCardFor(result) {
      if (result.kind === 'playlist') {
        return cardFor(result.item, { resultKind: 'Playlist' });
      }
      if (result.kind === 'channel') {
        return channelCardFor(result.item, { resultKind: 'Channel' });
      }
      if (result.kind === 'history') {
        return playlistVideoCardFor(result.item, {
          resultKind: 'Video',
          playlistSourcesHtml: playlistSourceLinksHtml(result.item),
        });
      }
      const video = result.item;
      return playlistVideoCardFor(video, {
        resultKind: 'Video',
      });
    }

    function channelCardFor(channel, options = {}) {
      const article = document.createElement('article');
      article.className = 'card';
      if (channel.thumbnail_path) {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.loading = 'lazy';
        img.alt = '';
        img.src = `/${channel.thumbnail_path}`;
        article.append(img);
      }
      const body = document.createElement('div');
      body.className = 'body';
      const youtubeUrl = channel.url || (channel.channel_id ? `https://www.youtube.com/channel/${encodeURIComponent(channel.channel_id)}` : '');
      const archivarixUrl = channel.channel_id ? `https://tube.archivarix.net/?q=${encodeURIComponent(channel.channel_id)}` : '';
      const status = String(channel.status || '').toLowerCase();
      const subscribedLabel = isSubscribedChannel(channel) ? 'Subscribed' : 'Non-subscribed';
      const titleText = channel.title || channel.channel_id;
      const titleHtml = creatorHtml(
        channel.thumbnail_path || '',
        titleText,
        channel.channel_id ? localChannelHref(channel.channel_id) : ''
      );
      body.innerHTML = `
        ${options.resultKind ? `<div class="result-kind">${escapeHtml(options.resultKind)}</div>` : ''}
        <div class="title-row">
          <div class="playlist-title">${titleHtml || escapeHtml(titleText)}</div>
          ${youtubeUrl ? `<a class="external-link" href="${escapeHtml(youtubeUrl)}" target="_blank" rel="noreferrer" title="Open on YouTube" aria-label="Open ${escapeHtml(titleText)} on YouTube">${externalLinkSvg()}</a>` : ''}
        </div>
        <div class="details">
          <span>${subscribedLabel}</span>
          ${status ? `<span class="badge">${escapeHtml(status)}</span>` : ''}
          ${channel.channel_id ? `<span>${escapeHtml(channel.channel_id)}</span>` : ''}
          ${channel.archivarix_channel_id ? `<span>Archivarix ${escapeHtml(channel.archivarix_channel_id)}</span>` : ''}
        </div>
        ${channel.status_reason ? `<div class="status">${escapeHtml(channel.status_reason)}</div>` : ''}
        ${channel.aliases ? `<div class="details"><span>${escapeHtml(channel.aliases)}</span></div>` : ''}
        ${channel.description ? `<div class="description">${escapeHtml(channel.description)}</div>` : ''}
        <div class="details">
          ${youtubeUrl ? `<a class="playlist-link" href="${escapeHtml(youtubeUrl)}" target="_blank" rel="noreferrer">YouTube</a>` : ''}
          ${archivarixUrl ? `<a class="playlist-link" href="${escapeHtml(archivarixUrl)}" target="_blank" rel="noreferrer">Archivarix</a>` : ''}
        </div>
      `;
      article.append(body);
      return article;
    }

    function externalLinkSvg() {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17 17 7"></path><path d="M8 7h9v9"></path><path d="M7 7H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"></path></svg>';
    }

    function hiddenVideoCardFor(video) {
      const watchUrl = youtubeWatchUrl(video);
      return videoCardFor({
        title: video.title,
        localUrl: video.video_id ? localVideoHref(video.video_id) : '',
        externalUrl: watchUrl,
        badges: [{ label: video.availability }],
        details: [
          video.channel ? creatorHtml('', video.channel, video.channel_id ? localChannelHref(video.channel_id) : '') : '',
          video.video_id ? `<span>${escapeHtml(video.video_id)}</span>` : '',
        ],
        reactionHtml: reactionIconsHtml(video),
        sparklineHtml: watchSparklineHtml(video),
        sources: [
          `<a class="playlist-link" href="${video.playlist_url}" target="_blank" rel="noreferrer">${escapeHtml(video.playlist_title)}</a>`,
        ],
      });
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    search.addEventListener('input', () => {
      currentPage = 1;
      if (search.value.trim()) {
        const wasSearchHash = window.location.hash === '#search' || window.location.hash.startsWith('#search?');
        selected = '__search__';
        renderGroups();
        const changed = updateSearchHash(wasSearchHash);
        if (changed && !wasSearchHash) return;
        render();
        return;
      }
      if (selected === '__search__') {
        setSelected('');
        return;
      }
      render();
    });
    searchNav?.addEventListener('click', () => setSelected('__search__'));
    viewContext.addEventListener('click', event => {
      const target = event.target.closest('[data-channel-tab]');
      if (!(target instanceof HTMLButtonElement)) return;
      channelDetailTab = target.dataset.channelTab || 'playlists';
      currentPage = 1;
      scrollResultsToTop();
      render();
    });
    meta.addEventListener('change', event => {
      const target = event.target;
      if (target instanceof HTMLSelectElement && target.dataset.videoSort !== undefined) {
        if (target.dataset.videoSort === 'playlist') {
          playlistViewSort = target.value || 'playlist_order';
        } else {
          allVideosSort = target.value || 'newest_added';
        }
        currentPage = 1;
        scrollResultsToTop();
        render();
        return;
      }
      if (target instanceof HTMLSelectElement && target.dataset.channelSort !== undefined) {
        channelViewSort = target.value || 'title';
        currentPage = 1;
        scrollResultsToTop();
        render();
        return;
      }
      if (target instanceof HTMLSelectElement && target.dataset.playlistSort !== undefined) {
        allPlaylistsSort = target.value || 'title';
        currentPage = 1;
        scrollResultsToTop();
        render();
        return;
      }
      if (target instanceof HTMLSelectElement && target.dataset.searchSort !== undefined) {
        searchResultsSort = target.value || 'relevance';
        currentPage = 1;
        scrollResultsToTop();
        syncSearchHashAndRender();
        return;
      }
      if (!(target instanceof HTMLInputElement)) return;
      const searchResultFilter = target.dataset.searchResultFilter;
      if (searchResultFilter) {
        searchResultVisibility[searchResultFilter] = target.checked;
        currentPage = 1;
        syncSearchHashAndRender();
        return;
      }
      const channelFilter = target.dataset.channelFilter;
      if (channelFilter) {
        channelVisibility[channelFilter] = target.checked;
        currentPage = 1;
        render();
        return;
      }
      const playlistVisibilityFilter = target.dataset.playlistVisibilityFilter;
      if (playlistVisibilityFilter) {
        playlistListVisibility[playlistVisibilityFilter] = target.checked;
        currentPage = 1;
        render();
        return;
      }
      const filter = target.dataset.playlistFilter;
      if (!filter) return;
      playlistVisibility[filter] = target.checked;
      currentPage = 1;
      render();
    });
    meta.addEventListener('input', event => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement) || target.dataset.playlistPageSearch === undefined) return;
      playlistPageSearch = target.value;
      const cursor = target.selectionStart ?? target.value.length;
      currentPage = 1;
      render();
      const replacement = meta.querySelector('[data-playlist-page-search]');
      if (replacement instanceof HTMLInputElement) {
        replacement.focus();
        replacement.setSelectionRange(cursor, cursor);
      }
    });
    function handlePagerClick(event) {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const direction = target.dataset.page;
      if (!direction) return;
      const page = Number(direction);
      if (Number.isFinite(page) && page > 0) currentPage = page;
      scrollResultsToTop();
      if (selected === '__search__') updateSearchHash(true);
      render();
    }
    function handlePagerChange(event) {
      const target = event.target;
      if (!(target instanceof HTMLSelectElement)) return;
      if (target.dataset.pageSize === undefined) return;
      pageSize = target.value || '100';
      currentPage = 1;
      scrollResultsToTop();
      if (selected === '__search__') updateSearchHash(true);
      render();
    }
    bottomPager.addEventListener('click', handlePagerClick);
    bottomPager.addEventListener('change', handlePagerChange);
    if (channelsFilter) {
      channelsFilter.addEventListener('change', () => {
        channelsFilter.indeterminate = false;
        channelsManuallyDisabled = !channelsFilter.checked;
        if (channelsFilter.checked && !channelChildFilters.some(child => child.checked)) {
          for (const child of channelChildFilters) child.checked = true;
        }
        currentPage = 1;
        syncChannelParentFilter();
        syncSearchForFilters();
        syncSearchHashAndRender();
      });
    }
    if (videosFilter) {
      videosFilter.addEventListener('change', () => {
        videosFilter.indeterminate = false;
        for (const child of videoSourceFilters) child.checked = videosFilter.checked;
        currentPage = 1;
        syncVideosParentFilter();
        syncSearchForFilters();
        syncSearchHashAndRender();
      });
    }
    for (const input of channelChildFilters) {
      input.addEventListener('change', () => {
        channelsManuallyDisabled = false;
        syncChannelParentFilter();
        syncSearchForFilters();
        currentPage = 1;
        syncSearchHashAndRender();
      });
    }
    for (const input of videoFieldFilters) {
      input.addEventListener('change', () => {
        syncVideosParentFilter();
        syncSearchForFilters();
        currentPage = 1;
        syncSearchHashAndRender();
      });
    }
    for (const input of videoSourceFilters) {
      input.addEventListener('change', () => {
        syncVideosParentFilter();
        syncSearchForFilters();
        currentPage = 1;
        syncSearchHashAndRender();
      });
    }
    for (const input of searchFilters) {
      if (
        input === channelsFilter
        || input === videosFilter
        || channelChildFilters.includes(input)
        || videoFieldFilters.includes(input)
        || videoSourceFilters.includes(input)
      ) continue;
      input.addEventListener('change', () => {
        syncSearchForFilters();
        currentPage = 1;
        syncSearchHashAndRender();
      });
    }
    syncChannelParentFilter();
    syncVideosParentFilter();
    syncSearchForFilters();
    window.addEventListener('hashchange', () => {
      selected = selectionFromHash();
      if (selected !== '__search__') currentPage = 1;
      channelDetailTab = 'playlists';
      if (selected.startsWith('__playlist__:')) resetPlaylistVisibilityFor(selected.slice('__playlist__:'.length));
      if (selected !== '__search__') search.value = '';
      renderGroups();
      render();
    });
    refresh.addEventListener('click', () => loadData().catch(error => {
      meta.textContent = error.message;
      refresh.disabled = false;
      refresh.textContent = 'Refresh';
    }));
    loadData().catch(error => {
      title.textContent = 'Unable to load data';
      meta.textContent = error.message;
      refresh.disabled = false;
      refresh.textContent = 'Refresh';
    });
  </script>
</body>
</html>
