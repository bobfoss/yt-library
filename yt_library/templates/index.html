<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YT Library</title>
  <link rel="icon" href="/favicon.svg?v=ytl" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f4ef;
      --panel: #fffdf8;
      --ink: #25231f;
      --muted: #6b655c;
      --line: #ded6cb;
      --accent: #0b7285;
      --accent-soft: #d7f2f4;
      --warn: #9a3412;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161513;
        --panel: #211f1b;
        --ink: #f4efe7;
        --muted: #b8afa3;
        --line: #39342d;
        --accent: #67d8e6;
        --accent-soft: #173b40;
        --warn: #f4a261;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); overflow: hidden; }
    .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; min-height: 0; }
    aside { border-right: 1px solid var(--line); background: var(--panel); padding: 18px 14px; position: sticky; top: 0; height: 100vh; overflow: auto; }
    main { min-width: 0; min-height: 0; padding: 24px; display: flex; flex-direction: column; }
    h1 { font-size: 20px; margin: 0 0 14px; }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .sidebar-header h1 { margin: 0; }
    .home-title { color: var(--ink); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .home-title:hover { color: var(--ink); text-decoration: none; }
    .library-mark { width: 28px; height: 28px; flex: none; }
    .admin-link { color: var(--accent); font-size: 13px; text-decoration: none; }
    .admin-link:hover { text-decoration: underline; }
    .search { width: 100%; border: 1px solid var(--line); background: var(--bg); color: var(--ink); border-radius: 6px; padding: 10px 12px; font: inherit; margin-bottom: 14px; }
    .filters { border-bottom: 1px solid var(--line); padding: 0 0 10px; margin-bottom: 14px; display: grid; gap: 7px; }
    .filter-title { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .filter { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
    .filter input { accent-color: var(--accent); }
    .filter.dimmed { opacity: .42; }
    .group { width: 100%; border: 0; background: transparent; color: var(--ink); display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; margin: 2px 0; border-radius: 6px; cursor: pointer; text-align: left; font: inherit; }
    .group:hover, .group.active { background: var(--accent-soft); }
    .search-nav { border-top: 1px solid var(--line); border-radius: 0; margin: 0 0 4px; padding-top: 12px; }
    .search-nav:hover, .search-nav.active { border-radius: 6px; }
    .group.child { padding-left: 28px; color: var(--muted); }
    .group-section { border-top: 1px solid var(--line); margin-top: 12px; padding-top: 10px; }
    .group-section:first-child { border-top: 0; margin-top: 0; padding-top: 0; }
    .group-section-title { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; padding: 0 10px 4px; }
    .count { color: var(--muted); font-size: 12px; margin-left: 8px; }
    .view-top { flex: 0 0 auto; min-width: 0; }
    .toolbar { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .title { font-size: 28px; line-height: 1.1; margin: 0; }
    .title-link { color: var(--ink); text-decoration: none; }
    .title-link:hover { color: var(--accent); text-decoration: none; }
    .title-with-action { display: inline-flex; align-items: center; gap: 10px; }
    .title-with-action .external-link { width: 30px; height: 30px; }
    .meta { color: var(--muted); font-size: 14px; }
    .meta-filter { display: inline-flex; align-items: center; gap: 5px; margin-left: 8px; }
    .meta-filter input { accent-color: var(--accent); }
    .playlist-search { border: 1px solid var(--line); background: var(--bg); color: var(--ink); border-radius: 6px; padding: 7px 10px; font: inherit; min-width: min(360px, 38vw); }
    .view-sort { display: inline-flex; align-items: center; gap: 6px; margin-left: 8px; }
    .view-sort select { border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 6px; padding: 5px 8px; font: inherit; }
    .pager { display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end; gap: 8px; color: var(--muted); font-size: 14px; margin: 0 0 14px; }
    .pager.bottom { margin: 18px 0 0; }
    .pager button, .pager select, .pager input { border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 6px; padding: 5px 8px; font: inherit; }
    .pager button { cursor: pointer; }
    .pager button:hover:not(:disabled) { background: var(--accent-soft); }
    .pager button:disabled { opacity: .45; cursor: default; }
    .pager button.current { background: var(--accent-soft); color: var(--ink); font-weight: 650; }
    .pager .page-jumps { --page-slot-width: 42px; display: inline-flex; align-items: center; gap: 8px; font-variant-numeric: tabular-nums; }
    .pager .page-jumps button, .pager .ellipsis, .pager .page-placeholder { flex: 0 0 var(--page-slot-width); width: var(--page-slot-width); min-width: var(--page-slot-width); min-height: 32px; display: inline-flex; align-items: center; justify-content: center; }
    .pager .ellipsis { color: var(--muted); border: 1px solid transparent; border-radius: 6px; padding: 5px 8px; }
    .pager .page-placeholder { visibility: hidden; border: 1px solid transparent; border-radius: 6px; padding: 5px 8px; }
    .pager .page-goto { display: inline-flex; align-items: center; gap: 6px; }
    .pager .page-goto input { width: 72px; }
    .view-context { flex: 0 0 auto; min-height: 0; margin-bottom: 14px; }
    .view-context[hidden] { display: none; }
    .view-top.history-top { display: grid; grid-template-columns: minmax(120px, 1fr) minmax(0, 760px) minmax(160px, 1fr); align-items: start; gap: 16px; margin-bottom: 14px; }
    .view-top.history-top .toolbar { display: contents; }
    .view-top.history-top .toolbar .title { grid-column: 1; grid-row: 1; }
    .view-top.history-top .toolbar > .details { grid-column: 3; grid-row: 1; justify-self: end; align-items: center; }
    .view-top.history-top .view-context { grid-column: 2; grid-row: 1; margin-bottom: 0; }
    .results-scroll { flex: 1 1 auto; min-height: 0; overflow: auto; padding-right: 4px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }
    .card { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); overflow: hidden; min-width: 0; }
    .thumb-link { display: block; }
    .thumb-wrap { position: relative; display: block; background: linear-gradient(135deg, #24424a, #d98948); }
    .thumb { display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover; background: linear-gradient(135deg, #24424a, #d98948); }
    .watch-progress { position: absolute; left: 0; right: auto; bottom: 0; height: 4px; background: #ff0033; }
    .body { padding: 11px 12px 13px; }
    .title-row { display: flex; align-items: flex-start; gap: 8px; }
    .playlist-title { display: block; color: var(--ink); font-weight: 650; line-height: 1.25; text-decoration: none; overflow-wrap: anywhere; }
    .playlist-title:hover { color: var(--accent); }
    .title-row .playlist-title { flex: 1; min-width: 0; }
    .external-link { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; flex: 0 0 auto; border: 1px solid var(--line); border-radius: 6px; color: var(--accent); text-decoration: none; }
    .external-link:hover { background: var(--accent-soft); }
    .external-link svg { width: 15px; height: 15px; }
    .details { color: var(--muted); font-size: 13px; margin-top: 7px; display: flex; flex-wrap: wrap; gap: 6px; }
    .visibility-label { display: inline-flex; align-items: center; gap: 4px; }
    .visibility-label svg { width: 14px; height: 14px; flex: 0 0 auto; }
    .playlist-sources { display: grid; gap: 3px; justify-items: start; }
    .badge-lines { display: grid; gap: 2px; justify-items: start; }
    .badge-lines .badge { display: block; }
    .channel-avatar { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; vertical-align: middle; flex: 0 0 auto; }
    .creator-link { color: var(--muted); text-decoration: none; }
    .creator-link:hover { color: var(--accent); text-decoration: underline; }
    .creator-chip { display: inline-flex; align-items: center; gap: 4px; min-width: 0; max-width: 100%; }
    .creator-name { min-width: 0; overflow-wrap: anywhere; }
    .description { color: var(--muted); font-size: 13px; line-height: 1.35; margin-top: 8px; max-height: 5.4em; overflow: hidden; }
    .video-detail { grid-column: 1 / -1; max-width: 1180px; }
    .video-detail .detail-layout { display: grid; grid-template-columns: minmax(220px, 360px) 1fr; gap: 18px; align-items: start; }
    .video-detail .description { max-height: none; white-space: pre-wrap; }
    .video-detail .thumb-wrap { border-radius: 6px; overflow: hidden; }
    .video-detail .thumb { border-radius: 6px; }
    .channel-detail { grid-column: 1 / -1; }
    .channel-detail .detail-layout { display: grid; grid-template-columns: 140px 1fr; gap: 18px; align-items: start; }
    .channel-detail .channel-avatar-large { width: 128px; height: 128px; border-radius: 50%; object-fit: cover; background: linear-gradient(135deg, #24424a, #d98948); }
    .channel-detail .description { max-height: none; white-space: pre-wrap; }
    .channel-detail .title-row .video-title { flex: 1 1 auto; min-width: 0; }
    .channel-external-links { display: inline-flex; align-items: center; gap: 5px; flex: 0 0 auto; }
    .channel-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-top: 12px; }
    .channel-tabs + .history-heatmap { margin-top: 14px; }
    .channel-tab { border: 0; border-bottom: 3px solid transparent; background: transparent; color: var(--muted); padding: 8px 12px; font: inherit; font-size: 13px; font-weight: 650; cursor: pointer; }
    .channel-tab:hover, .channel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .section-heading { grid-column: 1 / -1; color: var(--muted); font-size: 13px; margin: 8px 0 -4px; text-transform: uppercase; }
    .watched-line { color: var(--muted); font-size: 13px; margin-top: 7px; }
    .watch-sparkline { display: block; width: 86px; height: 14px; margin-top: 5px; color: var(--muted); overflow: visible; }
    .watch-sparkline .spark-dot { fill: currentColor; opacity: .52; }
    .watch-sparkline .spark-dot.latest { fill: var(--accent); opacity: 1; }
    .video-detail .watch-sparkline { width: min(260px, 100%); height: 18px; margin-top: 7px; }
    .reaction-line { color: var(--muted); display: flex; gap: 8px; align-items: center; margin-top: 6px; }
    .reaction-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linejoin: round; }
    .reaction-icon.active { color: var(--accent); fill: currentColor; stroke: currentColor; }
    .reaction-icon.dislike { transform: rotate(180deg); }
    .badge { color: var(--warn); font-weight: 650; }
    .refresh { border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 6px; padding: 7px 10px; font: inherit; cursor: pointer; }
    .refresh:hover { background: var(--accent-soft); }
    .top-link { display: inline-block; color: var(--accent); text-decoration: none; margin: -4px 0 14px; font-size: 13px; }
    .top-link:hover { text-decoration: underline; }
    .filter.child { margin-left: 18px; font-size: 13px; }
    .filter.grandchild { margin-left: 36px; font-size: 13px; }
    .history-list { display: grid; gap: 8px; }
    .history-row { display: grid; grid-template-columns: 150px 1fr; gap: 12px; align-items: stretch; }
    .history-row .thumb-wrap,
    .history-row .thumb { height: 84px; min-height: 84px; }
    .history-row .body { padding: 10px 12px; }
    .history-row .description { -webkit-line-clamp: 2; }
    .history-row .details.playlist-sources { margin-top: 5px; }
    .history-row.history-jump-target { outline: 2px solid var(--accent); outline-offset: 2px; }
    .history-heatmap { width: min(100%, 760px); min-width: 0; margin: 0 auto; }
    .history-heatmap-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 7px; }
    .history-heatmap-title { color: var(--muted); font-size: 12px; }
    .history-heatmap-nav { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; }
    .history-heatmap-nav button { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border: 1px solid var(--line); border-radius: 6px; padding: 0; background: var(--panel); color: var(--ink); font: inherit; font-size: 17px; line-height: 1; cursor: pointer; }
    .history-heatmap-nav button:hover:not(:disabled) { background: var(--accent-soft); }
    .history-heatmap-nav button:disabled { opacity: .4; cursor: default; }
    .history-heatmap-range { min-width: 112px; text-align: center; font-variant-numeric: tabular-nums; }
    .history-heatmap-scroll { max-width: 100%; overflow-x: auto; padding: 2px 1px 5px; }
    .history-heatmap-months,
    .history-heatmap-weeks { display: grid; grid-template-columns: repeat(53, 11px); column-gap: 3px; width: max-content; min-width: 100%; }
    .history-heatmap-months { min-height: 17px; color: var(--muted); font-size: 11px; }
    .history-heatmap-month { white-space: nowrap; }
    .history-heatmap-week { display: grid; grid-template-rows: repeat(7, 11px); gap: 3px; }
    .history-heatmap-day { width: 11px; height: 11px; border: 0; border-radius: 2px; padding: 0; background: color-mix(in srgb, var(--line) 48%, transparent); }
    button.history-heatmap-day { cursor: pointer; }
    button.history-heatmap-day:hover,
    button.history-heatmap-day:focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }
    .history-heatmap-day.level-1 { background: color-mix(in srgb, var(--accent) 30%, var(--panel)); }
    .history-heatmap-day.level-2 { background: color-mix(in srgb, var(--accent) 48%, var(--panel)); }
    .history-heatmap-day.level-3 { background: color-mix(in srgb, var(--accent) 68%, var(--panel)); }
    .history-heatmap-day.level-4 { background: var(--accent); }
    .video-title { color: var(--ink); font-weight: 650; line-height: 1.25; overflow-wrap: anywhere; }
    .playlist-link { color: var(--accent); text-decoration: none; overflow-wrap: anywhere; }
    .playlist-link:hover { text-decoration: underline; }
    .result-kind { color: var(--muted); font-size: 12px; text-transform: uppercase; margin-bottom: 5px; }
    .position { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .status { color: var(--warn); }
    .empty { color: var(--muted); padding: 36px 0; }
    .searching-status { display: inline-flex; min-width: 8em; }
    .searching-dots { display: inline-block; width: 1.4em; text-align: left; }
    @media (max-width: 760px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      aside { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      main { padding: 18px 14px; }
      .results-scroll { flex: none; overflow: visible; padding-right: 0; }
      .toolbar { display: block; }
      .view-top.history-top { display: block; margin-bottom: 0; }
      .view-top.history-top .toolbar { display: block; }
      .view-top.history-top .view-context { margin-bottom: 14px; }
      .title { font-size: 24px; margin-bottom: 6px; }
      .video-detail .detail-layout { grid-template-columns: 1fr; }
      .channel-detail .detail-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="sidebar-header">
        <h1><a class="home-title" href="/"><img class="library-mark" src="/favicon.svg?v=ytl" alt="">YT Library</a></h1>
        <a class="admin-link" href="/admin">Admin</a>
      </div>
      <button id="search-nav" class="group search-nav" type="button" data-key="__search__"><span>Search</span><span class="count"></span></button>
      <input id="search" class="search" type="search" placeholder="Search everything" autocomplete="off">
      <div class="filters" aria-label="Search filters">
        <div class="filter-title">Search In</div>
        <label class="filter"><input class="search-filter video-field-filter" type="checkbox" data-filter="videos" checked> Titles</label>
        <label class="filter"><input class="search-filter video-field-filter" type="checkbox" data-filter="descriptions" checked> Descriptions</label>
        <div class="filter-title">Search For</div>
        <label class="filter"><input class="search-filter" type="checkbox" data-filter="videos_root" checked> Videos</label>
        <label class="filter child"><input class="search-filter video-source-filter" type="checkbox" data-filter="playlist_videos" checked> Playlist videos</label>
        <label class="filter child"><input class="search-filter video-source-filter" type="checkbox" data-filter="history_videos" checked> History</label>
        <label class="filter child"><input class="search-filter video-source-filter" type="checkbox" data-filter="unavailable_videos" checked> Unavailable</label>
        <label class="filter"><input class="search-filter" type="checkbox" data-filter="channels" checked> Channels</label>
        <label class="filter child"><input class="search-filter channel-child-filter" type="checkbox" data-filter="channels_subscribed" checked> Subscribed</label>
        <label class="filter child"><input class="search-filter channel-child-filter" type="checkbox" data-filter="channels_unsubscribed" checked> Non-subscribed</label>
        <label class="filter"><input class="search-filter" type="checkbox" data-filter="playlists" checked> Playlists</label>
      </div>
      <nav id="groups"></nav>
    </aside>
    <main>
      <div id="view-top" class="view-top">
        <div class="toolbar">
          <h2 id="view-title" class="title"></h2>
          <div class="details">
            <button id="refresh" class="refresh" type="button">Refresh</button>
            <div id="view-meta" class="meta"></div>
          </div>
        </div>
        <section id="view-context" class="view-context" hidden></section>
      </div>
      <div class="results-scroll">
        <section id="grid" class="grid"></section>
        <div id="empty" class="empty" hidden aria-live="polite">No playlists match.</div>
      </div>
      <div id="bottom-pager" class="pager bottom" hidden></div>
    </main>
  </div>
  <script>
    const VideoCard = window.YTLibraryVideoCard;
    const CollectionCard = window.YTLibraryCollectionCard;
    const badgeRowsHtml = VideoCard.badgeRowsHtml;
    const creatorHtml = VideoCard.creatorHtml;
    const detailRowHtml = VideoCard.detailRowHtml;
    const escapeHtml = VideoCard.escapeHtml;
    const reactionIconsHtml = VideoCard.reactionIconsHtml;
    const reactionLabel = VideoCard.reactionLabel;
    const thumbnailWithProgress = VideoCard.thumbnailWithProgress;
    const watchProgressPercent = VideoCard.watchProgressPercent;
    const watchedLineHtml = VideoCard.watchedLineHtml;
    const watchSparklineHtml = (video, detail = false) => VideoCard.watchSparklineHtml(video, { detail });

    let data = null;
    let memberships = new Map();
    let children = new Map();

    let selected = '';
    let playlistVisibility = { videos: true, unavailable: true };
    let playlistListVisibility = { private: true, public: true, unlisted: true, others: true, unknown: true };
    let channelVisibility = { subscribed: true, non_subscribed: true, terminated: true };
    let searchResultVisibility = { unavailable: true };
    let searchResultsSort = 'relevance';
    let playlistVisibilityPlaylistId = '';
    let allVideosSort = 'newest_added';
    let likedVideosVisibility = { videos: true, unavailable: true };
    let likedVideosSort = 'newest_added';
    let playlistViewSort = 'playlist_order';
    let allPlaylistsSort = 'title';
    let channelViewSort = 'title';
    let playlistPageSearch = '';
    let currentPage = 1;
    let pageSize = '100';
    let historyPageState = { key: '', loading: false, data: null };
    let historyActivityState = { key: '', loading: false, data: null };
    let historyActivityYearOffset = 0;
    let omniSearchState = { key: '', data: null, promise: null };
    let viewDataCache = new Map();
    let pendingHistoryDate = '';
    let channelHistoryCounts = new Map();
    let channelDetailTab = 'playlists';
    let channelsManuallyDisabled = false;
    let renderGeneration = 0;
    let searchProgressTimer = null;
    let searchInputTimer = null;
    let playlistSearchTimer = null;
    const search = document.getElementById('search');
    const searchNav = document.getElementById('search-nav');
    const refresh = document.getElementById('refresh');
    const groupsEl = document.getElementById('groups');
    const searchFilters = [...document.querySelectorAll('.search-filter')];
    const playlistsFilter = document.querySelector('[data-filter="playlists"]');
    const channelsFilter = document.querySelector('[data-filter="channels"]');
    const channelChildFilters = [...document.querySelectorAll('.channel-child-filter')];
    const videosFilter = document.querySelector('[data-filter="videos_root"]');
    const videoFieldFilters = [...document.querySelectorAll('.video-field-filter')];
    const videoSourceFilters = [...document.querySelectorAll('.video-source-filter')];
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const title = document.getElementById('view-title');
    const meta = document.getElementById('view-meta');
    const bottomPager = document.getElementById('bottom-pager');
    const resultsScroll = document.querySelector('.results-scroll');
    const viewTop = document.getElementById('view-top');
    const viewContext = document.getElementById('view-context');

    async function loadData() {
      refresh.disabled = true;
      refresh.textContent = 'Refreshing';
      const response = await fetch('/api/bootstrap', { cache: 'no-store' });
      if (!response.ok) throw new Error(`Data refresh failed: ${response.status}`);
      data = await response.json();
      historyPageState = { key: '', loading: false, data: null };
      historyActivityState = { key: '', loading: false, data: null };
      omniSearchState = { key: '', data: null, promise: null };
      viewDataCache = new Map();
      channelHistoryCounts = new Map();
      memberships = new Map();
      for (const item of data.memberships) {
        if (!memberships.has(item.group_key)) memberships.set(item.group_key, []);
        memberships.get(item.group_key).push(item.playlist_id);
      }
      children = new Map();
      for (const group of data.groups) {
        const parent = group.parent_key || '';
        if (!children.has(parent)) children.set(parent, []);
        children.get(parent).push(group);
      }
      selected = selectionFromHash();
      renderGroups();
      render();
      refresh.disabled = false;
      refresh.textContent = 'Refresh';
    }

    async function fetchViewData(path) {
      const cached = viewDataCache.get(path);
      if (cached?.data) return cached.data;
      if (cached?.promise) return cached.promise;
      const promise = fetch(path, { cache: 'no-store' }).then(async response => {
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || `View fetch failed: ${response.status}`);
        }
        const payload = await response.json();
        viewDataCache.set(path, { data: payload, promise: null });
        return payload;
      }).catch(error => {
        viewDataCache.delete(path);
        throw error;
      });
      viewDataCache.set(path, { data: null, promise });
      return promise;
    }

    function remoteListPath(path, params = {}) {
      const size = pageSizeNumber();
      const limit = Number.isFinite(size) ? size : 500;
      const queryParams = new URLSearchParams({
        ...params,
        limit: String(limit),
        offset: String((currentPage - 1) * limit),
      });
      return `${path}?${queryParams}`;
    }

    function playlistSelection(playlistId) {
      return `__playlist__:${playlistId}`;
    }

    function videoSelection(videoId) {
      return `__video__:${videoId}`;
    }

    function channelSelection(channelId) {
      return `__channel__:${channelId}`;
    }

    function paginationParams() {
      const params = new URLSearchParams();
      if (currentPage > 1) params.set('page', String(currentPage));
      if (pageSize !== '100') params.set('size', pageSize);
      return params;
    }

    function appendHashParams(base, params) {
      const query = params.toString();
      return query ? `${base}?${query}` : base;
    }

    function hashParts(hash) {
      const queryIndex = hash.indexOf('?');
      return {
        base: queryIndex >= 0 ? hash.slice(0, queryIndex) : hash,
        params: new URLSearchParams(queryIndex >= 0 ? hash.slice(queryIndex + 1) : ''),
      };
    }

    function applyPaginationParams(params) {
      pageSize = params.get('size') || '100';
      const page = Number(params.get('page') || 1);
      currentPage = Number.isFinite(page) && page > 0 ? page : 1;
    }

    function currentHashHasPaginationParams() {
      const { params } = hashParts(window.location.hash || '');
      return params.has('page') || params.has('size');
    }

    function localPlaylistHref(playlistId, includePagination = false) {
      const base = `#playlist=${encodeURIComponent(playlistId)}`;
      return includePagination ? appendHashParams(base, paginationParams()) : base;
    }

    function localVideoHref(videoId, includePagination = false) {
      const base = `#video=${encodeURIComponent(videoId)}`;
      return includePagination ? appendHashParams(base, paginationParams()) : base;
    }

    function localChannelHref(channelId, includePagination = false) {
      const base = `#channel=${encodeURIComponent(channelId)}`;
      return includePagination ? appendHashParams(base, paginationParams()) : base;
    }

    const viewHashBySelection = new Map([
      ['__search__', 'search'],
      ['', 'all-playlists'],
      ['__all_videos__', 'playlist-videos'],
      ['__history__', 'history'],
      ['__liked__', 'liked-videos'],
      ['__unavailable_playlists__', 'playlists-with-unavailable'],
      ['__channels__', 'channels'],
      ['__subscribed_channels__', 'subscribed-channels'],
      ['__terminated_channels__', 'terminated-channels'],
    ]);
    const selectionByViewHash = new Map([...viewHashBySelection].map(([selection, hash]) => [hash, selection]));
    selectionByViewHash.set('all-videos', '__all_videos__');

    function localViewHref(value, includePagination = false) {
      if (value === '__search__') return searchHash();
      const viewHash = viewHashBySelection.get(value);
      const base = viewHash
        ? `#view=${viewHash}`
        : (value ? `#group=${encodeURIComponent(value)}` : '#view=all-playlists');
      return includePagination ? appendHashParams(base, paginationParams()) : base;
    }

    function searchFilterParamValue() {
      return [...activeSearchFilters()].sort().join(',');
    }

    function searchHash() {
      const params = new URLSearchParams();
      const query = search.value.trim();
      if (query) params.set('q', query);
      const filters = searchFilterParamValue();
      if (filters) params.set('f', filters);
      if (!searchResultVisibility.unavailable) params.set('unavailable', '0');
      if (searchResultsSort !== 'relevance') params.set('sort', searchResultsSort);
      if (currentPage > 1) params.set('page', String(currentPage));
      if (pageSize !== '100') params.set('size', pageSize);
      return `#search${params.toString() ? `?${params.toString()}` : ''}`;
    }

    function applySearchHash(hash) {
      const queryIndex = hash.indexOf('?');
      const params = new URLSearchParams(queryIndex >= 0 ? hash.slice(queryIndex + 1) : '');
      search.value = params.get('q') || '';
      const filterParam = params.get('f');
      if (filterParam !== null) {
        const active = new Set(filterParam.split(',').filter(Boolean));
        for (const input of searchFilters) {
          if (input.dataset.filter === 'videos_root') continue;
          input.checked = active.has(input.dataset.filter);
        }
        channelsManuallyDisabled = !channelChildFilters.some(child => child.checked);
        syncChannelParentFilter();
        syncVideosParentFilter();
        syncSearchForFilters();
      }
      searchResultVisibility.unavailable = params.get('unavailable') !== '0';
      searchResultsSort = params.get('sort') || 'relevance';
      pageSize = params.get('size') || '100';
      const page = Number(params.get('page') || 1);
      currentPage = Number.isFinite(page) && page > 0 ? page : 1;
    }

    function updateSearchHash(replace = false) {
      const href = searchHash();
      if (window.location.hash === href) return false;
      if (replace) {
        history.replaceState(null, '', href);
      } else {
        window.location.hash = href;
      }
      return true;
    }

    function hrefForCurrentSelection(includePagination = false) {
      if (selected.startsWith('__playlist__:')) {
        return localPlaylistHref(selected.slice('__playlist__:'.length), includePagination);
      }
      if (selected.startsWith('__video__:')) {
        return localVideoHref(selected.slice('__video__:'.length), includePagination);
      }
      if (selected.startsWith('__channel__:')) {
        return localChannelHref(selected.slice('__channel__:'.length), includePagination);
      }
      return localViewHref(selected, includePagination);
    }

    function updateCurrentHash(replace = false) {
      if (selected === '__search__') return updateSearchHash(replace);
      const href = hrefForCurrentSelection(true);
      if (window.location.hash === href) return false;
      if (replace) {
        history.replaceState(null, '', href);
      } else {
        window.location.hash = href;
      }
      return true;
    }

    function syncSearchHashAndRender() {
      if (selected === '__search__') {
        updateSearchHash(true);
        renderGroups();
      }
      render();
    }

    function selectionFromHash() {
      const hash = window.location.hash || '';
      if (hash === '#search' || hash.startsWith('#search?')) {
        applySearchHash(hash);
        return '__search__';
      }
      const { base, params } = hashParts(hash);
      applyPaginationParams(params);
      if (base.startsWith('#playlist=')) {
        const playlistId = decodeURIComponent(base.slice('#playlist='.length));
        if (playlistId) return playlistSelection(playlistId);
      }
      if (base.startsWith('#video=')) {
        const videoId = decodeURIComponent(base.slice('#video='.length));
        if (videoId) return videoSelection(videoId);
      }
      if (base.startsWith('#channel=')) {
        const channelId = decodeURIComponent(base.slice('#channel='.length));
        if (channelId) return channelSelection(channelId);
      }
      if (base.startsWith('#view=')) {
        const view = decodeURIComponent(base.slice('#view='.length));
        if (selectionByViewHash.has(view)) return selectionByViewHash.get(view);
      }
      if (base.startsWith('#group=')) {
        const groupKey = decodeURIComponent(base.slice('#group='.length));
        if (groupKey) return groupKey;
      }
      return '';
    }

    function setSelected(value) {
      selected = value;
      if (value !== '__search__') search.value = '';
      currentPage = 1;
      if (value.startsWith('__playlist__:')) {
        const playlistId = value.slice('__playlist__:'.length);
        resetPlaylistVisibilityFor(playlistId);
        if (window.location.hash !== localPlaylistHref(playlistId)) {
          window.location.hash = localPlaylistHref(playlistId);
          return;
        }
      } else if (value.startsWith('__video__:')) {
        const videoId = value.slice('__video__:'.length);
        if (window.location.hash !== localVideoHref(videoId)) {
          window.location.hash = localVideoHref(videoId);
          return;
        }
      } else if (value.startsWith('__channel__:')) {
        const channelId = value.slice('__channel__:'.length);
        if (window.location.hash !== localChannelHref(channelId)) {
          window.location.hash = localChannelHref(channelId);
          return;
        }
      } else {
        const href = localViewHref(value);
        if (window.location.hash !== href) {
          window.location.hash = href;
          return;
        }
      }
      renderGroups();
      render();
    }

    function resetPlaylistVisibilityFor(playlistId) {
      if (playlistVisibilityPlaylistId === playlistId) return;
      playlistVisibilityPlaylistId = playlistId;
      playlistVisibility = { videos: true, unavailable: true };
      playlistPageSearch = '';
    }

    function groupCount(groupKey) {
      const own = memberships.get(groupKey) || [];
      const nested = (children.get(groupKey) || []).flatMap(child => memberships.get(child.group_key) || []);
      return new Set([...own, ...nested]).size;
    }

    function activeSearchFilters() {
      return new Set(
        searchFilters
          .filter(input => {
            if (!input.checked) return false;
            if (input.dataset.filter === 'videos_root') return false;
            if (input.classList.contains('channel-child-filter') && !channelsFilter.checked) return false;
            if (input.classList.contains('video-source-filter') && !videosFilter.checked) return false;
            return true;
          })
          .map(input => input.dataset.filter)
      );
    }

    function syncChannelParentFilter() {
      if (!channelsFilter || !channelChildFilters.length) return;
      const checkedCount = channelChildFilters.filter(input => input.checked).length;
      if (channelsManuallyDisabled) {
        channelsFilter.checked = false;
        channelsFilter.indeterminate = false;
      } else {
        channelsFilter.checked = checkedCount > 0;
        channelsFilter.indeterminate = checkedCount > 0 && checkedCount < channelChildFilters.length;
      }
      setFilterDimmed(channelChildFilters, !channelsFilter.checked);
    }

    function syncVideosParentFilter() {
      if (!videosFilter) return;
      const checkedSourceCount = videoSourceFilters.filter(input => input.checked).length;
      videosFilter.checked = checkedSourceCount > 0;
      videosFilter.indeterminate = checkedSourceCount > 0 && checkedSourceCount < videoSourceFilters.length;
      setFilterDimmed(videoSourceFilters, !videosFilter.checked);
    }

    function syncSearchForFilters() {
      const checkedFieldCount = videoFieldFilters.filter(input => input.checked).length;
      const fieldless = checkedFieldCount === 0;
      setFilterDimmed([playlistsFilter, channelsFilter, videosFilter], fieldless);
      setFilterDimmed(channelChildFilters, fieldless || !channelsFilter.checked);
      setFilterDimmed(videoSourceFilters, fieldless || !videosFilter.checked);
    }

    function setFilterDimmed(inputs, dimmed) {
      for (const input of inputs) {
        const label = input?.closest?.('.filter');
        if (label) label.classList.toggle('dimmed', dimmed);
      }
    }

    function isSubscribedChannel(channel) {
      return Number(channel.subscribed || 0) === 1;
    }

    function isTerminatedChannel(channel) {
      return ['terminated', 'deleted'].includes(String(channel.status || '').toLowerCase());
    }

    function channelVisibilityCategory(channel) {
      if (isTerminatedChannel(channel)) return 'terminated';
      return isSubscribedChannel(channel) ? 'subscribed' : 'non_subscribed';
    }

    function playlistVisibilityCategory(playlist) {
      const value = String(playlist.visibility || '').trim().toLowerCase();
      if (['private', 'public', 'unlisted'].includes(value)) return value;
      return String(playlist.owner_channel_id || '').trim() && !Number(playlist.is_library_owner || 0)
        ? 'others'
        : 'unknown';
    }

    function displayPlaylistVisibility(playlist) {
      const value = playlistVisibilityCategory(playlist);
      return ['unknown', 'others'].includes(value) ? '' : value[0].toUpperCase() + value.slice(1);
    }

    function playlistVisibilityLabelHtml(playlist) {
      const value = playlistVisibilityCategory(playlist);
      return visibilityLabelHtml(value, displayPlaylistVisibility(playlist));
    }

    function visibilityFilterLabelHtml(value, count) {
      return visibilityLabelHtml(value, `${count} ${value}`);
    }

    function visibilityLabelHtml(value, label) {
      if (!label || !['private', 'public', 'unlisted'].includes(value)) return label ? escapeHtml(label) : '';
      return `<span class="visibility-label">${visibilityIconSvg(value)}<span>${escapeHtml(label)}</span></span>`;
    }

    function visibilityIconSvg(value) {
      if (value === 'public') {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M12 2a15.3 15.3 0 0 1 0 20"></path><path d="M12 2a15.3 15.3 0 0 0 0 20"></path></svg>';
      }
      if (value === 'unlisted') {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 7H7a5 5 0 0 0 0 10h2"></path><path d="M15 7h2a5 5 0 0 1 0 10h-2"></path><path d="M8 12h8"></path><path d="M3 3l18 18"></path></svg>';
      }
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>';
    }

    function includesQuery(value, query) {
      return String(value || '').toLowerCase().includes(query);
    }

    function usefulMetadataTitle(video) {
      const title = String(video.metadata_title || '').trim();
      if (!title || title === '- YouTube' || title === 'YouTube') return '';
      return title;
    }

    function displayVideoTitle(video) {
      return usefulMetadataTitle(video) || video.title || video.video_id;
    }

    function displayVideoChannel(video) {
      return video.metadata_channel || video.channel || '';
    }

    function displayVideoChannelUrl(video) {
      return video.metadata_channel_url || '';
    }

    function displayVideoChannelLocalUrl(video) {
      const channelId = video.metadata_channel_id || video.channel_id || video.recovered_channel_id || '';
      return channelId ? localChannelHref(channelId) : displayVideoChannelUrl(video);
    }

    function displayVideoDuration(video) {
      return video.metadata_duration || video.duration_text || '';
    }

    function displayVideoUploadDate(video) {
      const value = video.metadata_upload_date || '';
      if (!value) return '';
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      const timeZone = window.YTLibraryTime.timeZone || window.YTLibraryTime.detected();
      const date = new Intl.DateTimeFormat(undefined, { dateStyle: 'medium', timeZone }).format(parsed);
      const time = new Intl.DateTimeFormat(undefined, { timeStyle: 'short', timeZone }).format(parsed);
      return `${date} ${time}`;
    }

    function youtubeWatchUrl(video) {
      if (!video.video_id) return '';
      const list = video.playlist_id ? `&list=${encodeURIComponent(video.playlist_id)}` : '';
      return `https://www.youtube.com/watch?v=${encodeURIComponent(video.video_id)}${list}`;
    }

    function matchTypeLabel(video) {
      if (video.source_type) return '';
      if (video.match_type === 'ambiguous_hidden_candidate') return '';
      const label = video.match_label || '';
      if (/^matched by\b/i.test(label)) return '';
      return label;
    }

    function wasRemovedFromPlaylist(video) {
      return video.source_quality === 'takeout' && video.match_type === 'ambiguous_hidden_candidate';
    }

    function isUnavailablePlaylistVideo(video) {
      return !Number(video.is_playable || 0) || Boolean(unavailableLabel(video));
    }

    function wasRemovedByMeFromPlaylist(video) {
      return wasRemovedFromPlaylist(video) && !isUnavailablePlaylistVideo(video);
    }

    function pageSizeNumber() {
      if (pageSize === 'all') return Infinity;
      const value = Number(pageSize || 100);
      return Number.isFinite(value) && value > 0 ? value : 100;
    }

    function pageSlice(rows) {
      const size = pageSizeNumber();
      if (!Number.isFinite(size)) {
        currentPage = 1;
        return { pageRows: rows, page: 1, pageCount: 1, start: rows.length ? 1 : 0, end: rows.length, total: rows.length };
      }
      const pageCount = Math.max(1, Math.ceil(rows.length / size));
      currentPage = Math.min(Math.max(1, currentPage), pageCount);
      const startIndex = (currentPage - 1) * size;
      const endIndex = Math.min(rows.length, startIndex + size);
      return {
        pageRows: rows.slice(startIndex, endIndex),
        page: currentPage,
        pageCount,
        start: rows.length ? startIndex + 1 : 0,
        end: endIndex,
        total: rows.length,
      };
    }

    function pageJumpItems(pageInfo) {
      if (pageInfo.pageCount <= 1) return [];
      if (pageInfo.pageCount <= 7) {
        const items = Array.from({ length: pageInfo.pageCount }, (_, index) => index + 1);
        while (items.length < 7) items.push('placeholder');
        return items;
      }
      const page = pageInfo.page;
      const last = pageInfo.pageCount;
      if (page <= 3) {
        const leading = Array.from({ length: 4 - page }, () => 'placeholder');
        const pages = Array.from({ length: Math.min(page + 1, last) }, (_, index) => index + 1);
        const items = [...leading, ...pages, 'ellipsis', last];
        while (items.length < 7) items.push('placeholder');
        return items.slice(0, 7);
      }
      if (page >= last - 2) {
        const firstPage = Math.max(1, page - 1);
        const pages = Array.from({ length: last - firstPage + 1 }, (_, index) => firstPage + index);
        const trailing = Array.from({ length: Math.max(0, 7 - 2 - pages.length) }, () => 'placeholder');
        const items = [1, 'ellipsis', ...pages, ...trailing];
        while (items.length < 7) items.push('placeholder');
        return items.slice(0, 7);
      }
      return [1, 'ellipsis', page - 1, page, page + 1, 'ellipsis', last];
    }

    function pageJumpHtml(pageInfo) {
      const items = pageJumpItems(pageInfo);
      if (!items.length) return '';
      return `
        <span class="page-jumps">
          ${items.map(item => {
            if (item === 'ellipsis') return '<span class="ellipsis">...</span>';
            if (item === 'placeholder') return '<span class="page-placeholder">&nbsp;</span>';
            return `<button type="button" class="${item === pageInfo.page ? 'current' : ''}" data-page="${item}" ${item === pageInfo.page ? 'disabled' : ''}>${item}</button>`;
          }).join('')}
        </span>
      `;
    }

    function pageGotoHtml(pageInfo) {
      if (pageInfo.pageCount <= 1) return '';
      return `
        <form class="page-goto" data-page-goto>
          <label>Go to
            <input type="number" data-page-goto-input min="1" max="${pageInfo.pageCount}" value="${pageInfo.page}" inputmode="numeric">
          </label>
          <button type="submit">Go</button>
        </form>
      `;
    }

    function pagerHtml(pageInfo, includePageSize = false) {
      if (!pageInfo.total) return '';
      const pageSizes = ['50', '100', '250', '500'];
      const sizeHtml = includePageSize ? `
        <label>Page size
          <select data-page-size>
            ${pageSizes.map(value => `<option value="${value}" ${pageSize === value ? 'selected' : ''}>${value === 'all' ? 'All' : value}</option>`).join('')}
          </select>
        </label>
      ` : '';
      return `
        ${sizeHtml}
        <span>Showing ${pageInfo.start}-${pageInfo.end} of ${pageInfo.total}</span>
        ${pageJumpHtml(pageInfo)}
        ${pageGotoHtml(pageInfo)}
      `;
    }

    function renderPager(pageInfo) {
      bottomPager.hidden = !pageInfo.total;
      bottomPager.innerHTML = pagerHtml(pageInfo, true);
      if (currentHashHasPaginationParams()) updateCurrentHash(true);
    }

    function hidePager() {
      bottomPager.hidden = true;
      bottomPager.replaceChildren();
    }

    function pagedRows(rows) {
      const pageInfo = pageSlice(rows);
      renderPager(pageInfo);
      return pageInfo;
    }

    function renderPagedGrid(rows, cardFn, emptyText) {
      const pageInfo = pagedRows(rows);
      grid.className = 'grid';
      grid.replaceChildren(...pageInfo.pageRows.map(cardFn));
      empty.hidden = pageInfo.pageRows.length !== 0;
      empty.textContent = emptyText;
      return pageInfo;
    }

    function stopSearchProgress() {
      if (searchProgressTimer !== null) {
        clearInterval(searchProgressTimer);
        searchProgressTimer = null;
      }
      empty.classList.remove('searching-status');
    }

    function showSearchProgress() {
      stopSearchProgress();
      grid.className = 'grid';
      grid.replaceChildren();
      empty.hidden = false;
      empty.classList.add('searching-status');
      const label = document.createElement('span');
      label.textContent = 'Searching';
      const dots = document.createElement('span');
      dots.className = 'searching-dots';
      dots.textContent = '.';
      empty.replaceChildren(label, dots);
      let dotCount = 1;
      searchProgressTimer = setInterval(() => {
        dotCount = dotCount === 3 ? 1 : dotCount + 1;
        dots.textContent = '.'.repeat(dotCount);
      }, 280);
    }

    function remotePageInfo(total, rowsLength, remoteLimit = 0) {
      const size = pageSizeNumber();
      const effectiveSize = remoteLimit || (Number.isFinite(size) ? size : 1000);
      const pageCount = Math.max(1, Math.ceil(total / effectiveSize));
      currentPage = Math.min(Math.max(1, currentPage), pageCount);
      const start = total ? (currentPage - 1) * effectiveSize + 1 : 0;
      const end = total ? Math.min(total, start + rowsLength - 1) : 0;
      return { pageRows: [], page: currentPage, pageCount, start, end, total };
    }

    function remotePayloadPageInfo(payload, rowsLength) {
      const limit = Number(payload.limit || pageSizeNumber() || 100);
      currentPage = Math.floor(Number(payload.offset || 0) / limit) + 1;
      return remotePageInfo(Number(payload.total || 0), rowsLength, limit);
    }

    async function fetchHistoryPage(channelId = '') {
      const size = pageSizeNumber();
      const limit = Number.isFinite(size) ? size : 1000;
      const offset = (currentPage - 1) * limit;
      const key = `${channelId}:${limit}:${offset}`;
      if (historyPageState.key === key && historyPageState.data) return historyPageState.data;
      historyPageState = { key, loading: true, data: historyPageState.key === key ? historyPageState.data : null };
      const params = new URLSearchParams({ limit: String(limit), offset: String(offset) });
      if (channelId) params.set('channel_id', channelId);
      const response = await fetch(`/api/history/search?${params}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`History fetch failed: ${response.status}`);
      const payload = await response.json();
      if (channelId) {
        channelHistoryCounts.set(
          channelId,
          Number(payload.totals?.filtered_watch_rows ?? payload.totals?.watch_rows ?? 0),
        );
      }
      if (historyPageState.key === key) {
        historyPageState = { key, loading: false, data: payload };
      }
      return payload;
    }

    function cachedChannelHistoryCount(channelId) {
      const value = channelHistoryCounts.get(channelId);
      return typeof value === 'number' ? value : null;
    }

    async function fetchChannelHistoryCount(channelId) {
      const cached = channelHistoryCounts.get(channelId);
      if (typeof cached === 'number') return cached;
      if (cached) return cached;
      const request = fetch(`/api/history/search?${new URLSearchParams({ channel_id: channelId, limit: '1' })}`, { cache: 'no-store' })
        .then(response => {
          if (!response.ok) throw new Error(`Channel history fetch failed: ${response.status}`);
          return response.json();
        })
        .then(payload => {
          const total = Number(payload.totals?.filtered_watch_rows ?? payload.totals?.watch_rows ?? 0);
          channelHistoryCounts.set(channelId, total);
          return total;
        })
        .catch(error => {
          channelHistoryCounts.delete(channelId);
          throw error;
        });
      channelHistoryCounts.set(channelId, request);
      return request;
    }

    function localDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function historyActivityRange() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const targetYear = today.getFullYear() - historyActivityYearOffset;
      const lastDayOfTargetMonth = new Date(targetYear, today.getMonth() + 1, 0).getDate();
      const end = new Date(targetYear, today.getMonth(), Math.min(today.getDate(), lastDayOfTargetMonth));
      const start = new Date(end);
      start.setDate(start.getDate() - start.getDay() - (52 * 7));
      return { start, end, startKey: localDateKey(start), endKey: localDateKey(end) };
    }

    async function fetchHistoryActivity(channelId = '') {
      const range = historyActivityRange();
      const key = `${channelId}:${range.startKey}:${range.endKey}`;
      if (historyActivityState.key === key && historyActivityState.data) return historyActivityState.data;
      if (historyActivityState.key === key && historyActivityState.loading) return historyActivityState.loading;
      const params = new URLSearchParams({ start: range.startKey, end: range.endKey });
      if (channelId) params.set('channel_id', channelId);
      const request = fetch(`/api/history/activity?${params}`, { cache: 'no-store' })
        .then(response => {
          if (!response.ok) throw new Error(`History activity fetch failed: ${response.status}`);
          return response.json();
        })
        .then(payload => {
          if (historyActivityState.key === key) {
            historyActivityState = { key, loading: false, data: payload };
          }
          return payload;
        })
        .catch(error => {
          if (historyActivityState.key === key) {
            historyActivityState = { key: '', loading: false, data: null };
          }
          throw error;
        });
      historyActivityState = { key, loading: request, data: null };
      return request;
    }

    function heatmapLevel(count, sortedCounts) {
      if (!count || !sortedCounts.length) return 0;
      const threshold = fraction => sortedCounts[Math.floor((sortedCounts.length - 1) * fraction)];
      if (count <= threshold(.25)) return 1;
      if (count <= threshold(.5)) return 2;
      if (count <= threshold(.75)) return 3;
      return 4;
    }

    function historyHeatmapFor(payload) {
      const range = historyActivityRange();
      const activity = new Map((payload.activity || []).map(day => [day.watch_date, day]));
      const sortedCounts = [...activity.values()]
        .map(day => Number(day.watch_count || 0))
        .filter(Boolean)
        .sort((left, right) => left - right);
      const heatmap = document.createElement('section');
      heatmap.className = 'history-heatmap';
      heatmap.dataset.historyChannelId = payload.channel_id || '';
      heatmap.setAttribute('aria-label', 'Views by day');
      const header = document.createElement('div');
      header.className = 'history-heatmap-header';
      const heading = document.createElement('div');
      heading.className = 'history-heatmap-title';
      heading.textContent = 'Views';
      const nav = document.createElement('div');
      nav.className = 'history-heatmap-nav';
      const previous = document.createElement('button');
      previous.type = 'button';
      previous.dataset.historyYearShift = '1';
      previous.title = 'Previous year';
      previous.setAttribute('aria-label', 'Previous year');
      previous.textContent = '<';
      const rangeLabel = document.createElement('span');
      rangeLabel.className = 'history-heatmap-range';
      const rangeDateLabel = date => date.toLocaleDateString(undefined, { month: 'short', year: 'numeric' });
      rangeLabel.textContent = `${rangeDateLabel(range.start)} - ${rangeDateLabel(range.end)}`;
      const next = document.createElement('button');
      next.type = 'button';
      next.dataset.historyYearShift = '-1';
      next.title = 'Next year';
      next.setAttribute('aria-label', 'Next year');
      next.textContent = '>';
      next.disabled = historyActivityYearOffset === 0;
      nav.append(previous, rangeLabel, next);
      header.append(heading, nav);
      const scroll = document.createElement('div');
      scroll.className = 'history-heatmap-scroll';
      const months = document.createElement('div');
      months.className = 'history-heatmap-months';
      const weeks = document.createElement('div');
      weeks.className = 'history-heatmap-weeks';
      const seenMonths = new Set();
      for (let weekIndex = 0; weekIndex < 53; weekIndex += 1) {
        const weekStart = new Date(range.start);
        weekStart.setDate(weekStart.getDate() + (weekIndex * 7));
        const monthDate = new Date(weekStart);
        for (let dayIndex = 0; dayIndex < 7; dayIndex += 1) {
          const candidate = new Date(weekStart);
          candidate.setDate(candidate.getDate() + dayIndex);
          if (candidate.getDate() === 1) {
            monthDate.setTime(candidate.getTime());
            break;
          }
        }
        const monthKey = `${monthDate.getFullYear()}-${monthDate.getMonth()}`;
        if (!seenMonths.has(monthKey)) {
          seenMonths.add(monthKey);
          const label = document.createElement('span');
          label.className = 'history-heatmap-month';
          label.style.gridColumn = String(weekIndex + 1);
          label.textContent = monthDate.toLocaleDateString(undefined, { month: 'short' });
          months.append(label);
        }
        const week = document.createElement('div');
        week.className = 'history-heatmap-week';
        for (let dayIndex = 0; dayIndex < 7; dayIndex += 1) {
          const date = new Date(weekStart);
          date.setDate(date.getDate() + dayIndex);
          const dateKey = localDateKey(date);
          const day = activity.get(dateKey);
          const count = Number(day?.watch_count || 0);
          const label = `${date.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}: ${count} ${count === 1 ? 'view' : 'views'}`;
          const cell = document.createElement(count && date <= range.end ? 'button' : 'span');
          cell.className = `history-heatmap-day level-${heatmapLevel(count, sortedCounts)}`;
          cell.title = label;
          cell.setAttribute('aria-label', label);
          if (cell instanceof HTMLButtonElement) {
            cell.type = 'button';
            cell.dataset.historyDate = dateKey;
            cell.dataset.historyOffset = String(Number(day.offset || 0));
          }
          week.append(cell);
        }
        weeks.append(week);
      }
      scroll.append(months, weeks);
      heatmap.append(header, scroll);
      return heatmap;
    }

    async function shiftHistoryActivityYear(delta) {
      const nextOffset = Math.max(0, historyActivityYearOffset + delta);
      if (nextOffset === historyActivityYearOffset) return;
      const heatmap = viewContext.querySelector('.history-heatmap');
      if (!(heatmap instanceof HTMLElement)) {
        historyActivityYearOffset = nextOffset;
        await render();
        return;
      }
      const previousOffset = historyActivityYearOffset;
      const channelId = heatmap.dataset.historyChannelId || '';
      historyActivityYearOffset = nextOffset;
      heatmap.setAttribute('aria-busy', 'true');
      for (const button of heatmap.querySelectorAll('.history-heatmap-nav button')) {
        button.disabled = true;
      }
      try {
        const activity = await fetchHistoryActivity(channelId);
        const channelHeatmapActive = Boolean(
          channelId
          && selected === channelSelection(channelId)
          && channelDetailTab === 'history'
        );
        if ((selected === '__history__' || channelHeatmapActive) && heatmap.isConnected) {
          heatmap.replaceWith(historyHeatmapFor(activity));
        }
      } catch (error) {
        historyActivityYearOffset = previousOffset;
        heatmap.removeAttribute('aria-busy');
        for (const button of heatmap.querySelectorAll('.history-heatmap-nav button')) {
          button.disabled = button.dataset.historyYearShift === '-1' && historyActivityYearOffset === 0;
        }
        throw error;
      }
    }

        row.classList.add('history-jump-target');

      const title = String(video.title || '').trim().toLowerCase().replace(/^[\[\(]+|[\]\)]+$/g, '');
      if (title === 'private video' || title === 'deleted video') return video.title || 'Unavailable';
      return '';

    async function fetchOmniSearch(query) {
      const size = pageSizeNumber();
      const limit = Number.isFinite(size) ? size : 5000;
      const offset = (currentPage - 1) * limit;
      const params = new URLSearchParams({
        q: query,
        filters: searchFilterParamValue() || '__none__',
        unavailable: searchResultVisibility.unavailable ? '1' : '0',
        sort: searchResultsSort,
        limit: String(limit),
        offset: String(offset),
      });
      const key = params.toString();
      if (omniSearchState.key === key && omniSearchState.data) return omniSearchState.data;
      if (omniSearchState.key === key && omniSearchState.promise) return omniSearchState.promise;
      const promise = fetch(`/api/search?${params}`, { cache: 'no-store' }).then(async response => {
        if (!response.ok) throw new Error(`Search failed: ${response.status}`);
        const payload = await response.json();
        if (omniSearchState.key === key) {
          omniSearchState = { key, data: payload, promise: null };
        }
        return payload;
      });
      omniSearchState = { key, data: null, promise };
      return promise;
    }
