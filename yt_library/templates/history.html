<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YT Library History</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f4ef;
      --panel: #fffdf8;
      --ink: #25231f;
      --muted: #6b655c;
      --line: #ded6cb;
      --accent: #0b7285;
      --accent-soft: #d7f2f4;
      --warn: #9a3412;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161513;
        --panel: #211f1b;
        --ink: #f4efe7;
        --muted: #b8afa3;
        --line: #39342d;
        --accent: #67d8e6;
        --accent-soft: #173b40;
        --warn: #f4a261;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); overflow: hidden; }
    .page { max-width: 1240px; height: 100vh; min-height: 0; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; }
    header { display: flex; align-items: baseline; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
    h1 { font-size: 30px; line-height: 1.1; margin: 0; }
    nav { display: flex; gap: 12px; flex-wrap: wrap; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .searchbar { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 12px; }
    input[type="search"] { width: 100%; border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 6px; padding: 11px 12px; font: inherit; }
    button { border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 6px; padding: 0 14px; font: inherit; cursor: pointer; }
    button:hover { background: var(--accent-soft); }
    .meta { color: var(--muted); font-size: 14px; margin-bottom: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    .pager { display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end; gap: 8px; color: var(--muted); font-size: 14px; margin: 18px 0 0; }
    .pager button, .pager select { border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 6px; padding: 5px 8px; font: inherit; }
    .pager button { cursor: pointer; min-height: 32px; }
    .pager button:hover:not(:disabled) { background: var(--accent-soft); }
    .pager button:disabled { cursor: default; opacity: .5; background: var(--panel); }
    .pager button.current { background: var(--accent-soft); color: var(--ink); font-weight: 650; }
    .pager .page-jumps { display: inline-flex; align-items: center; gap: 8px; }
    .pager .page-jumps button, .pager .ellipsis, .pager .page-placeholder { min-width: 32px; min-height: 32px; display: inline-flex; align-items: center; justify-content: center; }
    .pager .ellipsis { color: var(--muted); border: 1px solid transparent; border-radius: 6px; padding: 5px 8px; }
    .pager .page-placeholder { visibility: hidden; border: 1px solid transparent; border-radius: 6px; padding: 5px 8px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab { padding: 8px 11px; border: 1px solid var(--line); border-radius: 6px; color: var(--muted); cursor: pointer; }
    .tab.active { background: var(--accent-soft); color: var(--ink); }
    .results-scroll { flex: 1 1 auto; min-height: 0; overflow: auto; padding-right: 4px; }
    .grid { display: grid; grid-template-columns: minmax(0, 1fr); gap: 10px; }
    .card { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); overflow: hidden; min-width: 0; display: grid; grid-template-columns: 220px minmax(0, 1fr); }
    .card.no-thumb .body { grid-column: 1 / -1; }
    .thumb-wrap { position: relative; display: block; background: linear-gradient(135deg, #24424a, #d98948); }
    .thumb { display: block; width: 100%; height: 100%; min-height: 124px; aspect-ratio: 16 / 9; object-fit: cover; background: linear-gradient(135deg, #24424a, #d98948); }
    .watch-progress { position: absolute; left: 0; right: auto; bottom: 0; height: 4px; background: #ff0033; }
    .body { padding: 11px 12px 13px; }
    .title { display: block; color: var(--ink); font-weight: 650; line-height: 1.25; overflow-wrap: anywhere; }
    .details { color: var(--muted); font-size: 13px; margin-top: 7px; display: flex; flex-wrap: wrap; gap: 6px; }
    .channel-avatar { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; vertical-align: middle; flex: 0 0 auto; }
    .creator-link { color: var(--muted); text-decoration: none; }
    .creator-link:hover { color: var(--accent); text-decoration: underline; }
    .creator-chip { display: inline-flex; align-items: center; gap: 4px; min-width: 0; max-width: 100%; }
    .creator-name { min-width: 0; overflow-wrap: anywhere; }
    .description { color: var(--muted); font-size: 13px; line-height: 1.35; margin-top: 8px; max-height: 5.4em; overflow: hidden; }
    .watched-line { color: var(--muted); font-size: 13px; margin-top: 7px; }
    .watch-sparkline { display: block; width: 112px; height: 14px; margin-top: 5px; color: var(--muted); overflow: visible; }
    .watch-sparkline .spark-dot { fill: currentColor; opacity: .52; }
    .watch-sparkline .spark-dot.latest { fill: var(--accent); opacity: 1; }
    .reaction-line { color: var(--muted); display: flex; gap: 8px; align-items: center; margin-top: 6px; }
    .reaction-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linejoin: round; }
    .reaction-icon.active { color: var(--accent); fill: currentColor; stroke: currentColor; }
    .reaction-icon.dislike { transform: rotate(180deg); }
    .badge { color: var(--warn); font-weight: 650; }
    .empty { color: var(--muted); padding: 36px 0; }
    @media (max-width: 720px) {
      body { overflow: auto; }
      .page { height: auto; min-height: 100vh; padding: 18px 14px; display: block; }
      header, .searchbar { display: block; }
      nav { margin-top: 10px; }
      button { margin-top: 8px; height: 40px; }
      .pager { align-items: flex-start; justify-content: flex-start; }
      .results-scroll { flex: none; overflow: visible; padding-right: 0; }
      .card { grid-template-columns: 1fr; }
      .thumb-wrap { height: auto; }
      .thumb { height: auto; min-height: 0; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>YT Library History</h1>
      <nav>
        <a href="/">Playlists</a>
        <a href="/admin">Admin</a>
      </nav>
    </header>
    <div class="searchbar">
      <input id="search" type="search" placeholder="Search watch history and metadata descriptions" autocomplete="off" autofocus>
      <button id="refresh" type="button">Search</button>
    </div>
    <div id="meta" class="meta"></div>
    <div class="results-scroll">
      <section id="results" class="grid"></section>
      <div id="empty" class="empty" hidden>No history matches.</div>
    </div>
    <div id="bottomPager" class="pager" hidden></div>
  </div>
  <script>
    const input = document.getElementById('search');
    const refresh = document.getElementById('refresh');
    const meta = document.getElementById('meta');
    const bottomPager = document.getElementById('bottomPager');
    const results = document.getElementById('results');
    const empty = document.getElementById('empty');
    let latest = { watch: [], totals: {} };
    let pageSize = '250';
    let currentPage = 1;
    let timer = null;
    let requestId = 0;

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function displayTitle(row) {
      return row.metadata_title || row.title || row.video_id;
    }

    function creatorHtml(path, name, url) {
      if (!name) return '';
      const avatar = path ? `<img class="channel-avatar" src="/${escapeHtml(path)}" alt="">` : '';
      const content = `${avatar}<span class="creator-name">${escapeHtml(name)}</span>`;
      return url
        ? `<a class="creator-link creator-chip" href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${content}</a>`
        : `<span class="creator-chip">${content}</span>`;
    }

    function watchProgressPercent(row) {
      const value = Number(row.watch_progress_percent || 0);
      if (!Number.isFinite(value) || value <= 0) return 0;
      return Math.max(1, Math.min(100, Math.round(value)));
    }

    function watchedLineHtml(row) {
      const progress = watchProgressPercent(row);
      const count = Number(row.watch_count || 0);
      const countText = Number.isFinite(count) && count > 0 ? ` · ${count} ${count === 1 ? 'watch' : 'watches'}` : '';
      if (!progress && !countText) return '';
      const progressText = progress ? ` ${progress}%` : '';
      return `<div class="watched-line">Watched${progressText}${countText}</div>`;
    }

    function watchDates(row) {
      return (Array.isArray(row.watch_dates) ? row.watch_dates : [])
        .map(value => String(value || '').slice(0, 10))
        .filter(value => /^\d{4}-\d{2}-\d{2}$/.test(value))
        .sort();
    }

    function watchSparklineHtml(row) {
      const dates = watchDates(row);
      if (!dates.length) return '';
      const times = dates.map(date => Date.parse(`${date}T00:00:00Z`)).filter(Number.isFinite);
      if (!times.length) return '';
      const min = Math.min(...times);
      const max = Math.max(...times);
      const span = Math.max(1, max - min);
      const bucketCount = Math.min(22, Math.max(1, Math.ceil(Math.sqrt(times.length) * 1.6)));
      const buckets = new Map();
      for (const time of times) {
        const index = span === 1 ? 0 : Math.min(bucketCount - 1, Math.floor(((time - min) / span) * bucketCount));
        const bucket = buckets.get(index) || { count: 0, time };
        bucket.count += 1;
        bucket.time = Math.max(bucket.time, time);
        buckets.set(index, bucket);
      }
      const width = 112;
      const height = 14;
      const padding = 5;
      const latestIndex = [...buckets.entries()].sort((a, b) => b[1].time - a[1].time)[0]?.[0];
      const maxCount = Math.max(...[...buckets.values()].map(bucket => bucket.count));
      const dots = [...buckets.entries()].sort((a, b) => a[0] - b[0]).map(([index, bucket]) => {
        const x = bucketCount === 1 ? width - padding : padding + (index / (bucketCount - 1)) * (width - padding * 2);
        const radius = Math.min(4.2, 1.8 + Math.sqrt(bucket.count / maxCount) * 2.4);
        const latest = index === latestIndex ? ' latest' : '';
        return `<circle class="spark-dot${latest}" cx="${x.toFixed(1)}" cy="${(height / 2).toFixed(1)}" r="${radius.toFixed(1)}"></circle>`;
      }).join('');
      const title = `${times.length} ${times.length === 1 ? 'watch' : 'watches'} from ${dates[0]} to ${dates[dates.length - 1]}`;
      return `<svg class="watch-sparkline" viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(title)}"><title>${escapeHtml(title)}</title>${dots}</svg>`;
    }

    function reactionLabel(row) {
      const reaction = String(row.reaction || '').trim().toUpperCase();
      if (reaction === 'L') return 'Liked';
      if (reaction === 'D') return 'Disliked';
      return '';
    }

    function thumbIconHtml(kind, active) {
      const classes = `reaction-icon ${kind}${active ? ' active' : ''}`;
      return `
        <svg class="${classes}" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 10v11H3V10h4Zm4.8 11H19c.9 0 1.7-.6 1.9-1.5l1.1-6.2c.2-1.2-.7-2.3-1.9-2.3h-5.4l.8-3.8c.1-.6 0-1.2-.4-1.6L14.2 4 8.7 9.5c-.5.5-.7 1.1-.7 1.8V19c0 1.1.9 2 2 2h1.8Z"></path>
        </svg>
      `;
    }

    function reactionIconsHtml(row) {
      const reaction = String(row.reaction || '').trim().toUpperCase();
      return `
        <div class="reaction-line" title="${escapeHtml(reactionLabel(row) || 'No like/dislike captured')}">
          ${thumbIconHtml('like', reaction === 'L')}
          ${thumbIconHtml('dislike', reaction === 'D')}
        </div>
      `;
    }

    function pageSizeNumber() {
      if (pageSize === 'all') return Infinity;
      const value = Number(pageSize || 250);
      return Number.isFinite(value) && value > 0 ? value : 250;
    }

    function pageJumpItems(pageInfo) {
      if (pageInfo.pageCount <= 1) return [];
      if (pageInfo.pageCount <= 7) {
        const items = Array.from({ length: pageInfo.pageCount }, (_, index) => index + 1);
        while (items.length < 7) items.push('placeholder');
        return items;
      }
      const page = pageInfo.page;
      const last = pageInfo.pageCount;
      if (page <= 3) {
        const leading = Array.from({ length: 4 - page }, () => 'placeholder');
        const pages = Array.from({ length: Math.min(page + 1, last) }, (_, index) => index + 1);
        const items = [...leading, ...pages, 'ellipsis', last];
        while (items.length < 7) items.push('placeholder');
        return items.slice(0, 7);
      }
      if (page >= last - 2) {
        const firstPage = Math.max(1, page - 1);
        const pages = Array.from({ length: last - firstPage + 1 }, (_, index) => firstPage + index);
        const trailing = Array.from({ length: Math.max(0, 7 - 2 - pages.length) }, () => 'placeholder');
        const items = [1, 'ellipsis', ...pages, ...trailing];
        while (items.length < 7) items.push('placeholder');
        return items.slice(0, 7);
      }
      return [1, 'ellipsis', page - 1, page, page + 1, 'ellipsis', last];
    }

    function pageJumpHtml(pageInfo) {
      const items = pageJumpItems(pageInfo);
      if (!items.length) return '';
      return `
        <span class="page-jumps">
          ${items.map(item => {
            if (item === 'ellipsis') return '<span class="ellipsis">...</span>';
            if (item === 'placeholder') return '<span class="page-placeholder">&nbsp;</span>';
            return `<button type="button" class="${item === pageInfo.page ? 'current' : ''}" data-page="${item}" ${item === pageInfo.page ? 'disabled' : ''}>${item}</button>`;
          }).join('')}
        </span>
      `;
    }

    function pagerHtml(pageInfo) {
      if (!pageInfo.total) return '';
      const pageSizes = ['50', '100', '250', '500', 'all'];
      return `
        <label>Page size
          <select data-page-size>
            ${pageSizes.map(value => `<option value="${value}" ${pageSize === value ? 'selected' : ''}>${value === 'all' ? 'All' : value}</option>`).join('')}
          </select>
        </label>
        <span>Showing ${pageInfo.start}-${pageInfo.end} of ${pageInfo.total}</span>
        ${pageJumpHtml(pageInfo)}
      `;
    }

    function renderPager(pageInfo) {
      bottomPager.hidden = !pageInfo.total;
      bottomPager.innerHTML = pagerHtml(pageInfo);
    }

    function scrollResultsToTop() {
      document.querySelector('.results-scroll')?.scrollTo({ top: 0 });
    }

    function thumbnailWithProgress(path, row) {
      const wrap = document.createElement('div');
      wrap.className = 'thumb-wrap';
      const img = document.createElement('img');
      img.className = 'thumb';
      img.loading = 'lazy';
      img.alt = '';
      img.src = `/${path}`;
      wrap.append(img);
      const progress = watchProgressPercent(row);
      if (progress) {
        const bar = document.createElement('div');
        bar.className = 'watch-progress';
        bar.style.width = `${progress}%`;
        wrap.append(bar);
      }
      return wrap;
    }

    function watchCard(row) {
      const article = document.createElement('article');
      article.className = row.metadata_thumbnail_path ? 'card' : 'card no-thumb';
      if (row.metadata_thumbnail_path) {
        article.append(thumbnailWithProgress(row.metadata_thumbnail_path, row));
      }
      const body = document.createElement('div');
      body.className = 'body';
      const watchUrl = row.video_id ? `https://www.youtube.com/watch?v=${encodeURIComponent(row.video_id)}` : row.url;
      const channelName = row.metadata_channel || row.channel || '';
      const channelUrl = row.metadata_channel_url || '';
      body.innerHTML = `
        <a class="title" href="${watchUrl}" target="_blank" rel="noreferrer">${escapeHtml(displayTitle(row))}</a>
        <div class="details">
          ${row.watched_at ? `<span>${escapeHtml(row.watched_at)}</span>` : ''}
          ${(row.history_badges || []).map(label => `<span class="badge">${escapeHtml(label)}</span>`).join('')}
          ${creatorHtml(row.metadata_channel_thumbnail_path, channelName, channelUrl)}
          ${row.video_id ? `<span>${escapeHtml(row.video_id)}</span>` : ''}
          ${row.metadata_fetch_status === 'error' ? '<span class="badge">metadata error</span>' : ''}
        </div>
        ${watchedLineHtml(row)}
        ${watchSparklineHtml(row)}
        ${reactionIconsHtml(row)}
        ${row.metadata_description ? `<div class="description">${escapeHtml(row.metadata_description)}</div>` : ''}
      `;
      article.append(body);
      return article;
    }

    function render() {
      const rows = latest.watch || [];
      results.className = 'grid';
      results.replaceChildren(...rows.map(watchCard));
      empty.hidden = rows.length !== 0;
      const totals = latest.totals || {};
      const filtered = totals.filtered_watch_rows || 0;
      const start = filtered && rows.length ? (latest.offset || 0) + 1 : 0;
      const end = filtered && rows.length ? (latest.offset || 0) + rows.length : 0;
      meta.innerHTML = `
        <span>${latest.watch.length} watch results shown</span>
        <span>${filtered} matching watch rows</span>
        <span>${totals.watch_rows || 0} watch rows</span>
        <span>${totals.distinct_watch_videos || 0} distinct videos</span>
      `;
      const size = pageSizeNumber();
      const pageCount = Number.isFinite(size) ? Math.max(1, Math.ceil(filtered / size)) : 1;
      currentPage = Number.isFinite(size) ? Math.min(Math.max(1, currentPage), pageCount) : 1;
      renderPager({ page: currentPage, pageCount, start, end, total: filtered });
    }

    async function load() {
      const myRequest = ++requestId;
      refresh.disabled = true;
      refresh.textContent = 'Searching';
      const size = pageSizeNumber();
      const limit = Number.isFinite(size) ? size : Math.max(latest.totals?.filtered_watch_rows || latest.totals?.watch_rows || 1000000, 1);
      const offset = Number.isFinite(size) ? (currentPage - 1) * size : 0;
      const params = new URLSearchParams({ q: input.value.trim(), limit: String(limit), offset: String(offset) });
      const response = await fetch(`/api/history/search?${params}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`History search failed: ${response.status}`);
      const payload = await response.json();
      if (myRequest === requestId) {
        latest = payload;
        render();
      }
      refresh.disabled = false;
      refresh.textContent = 'Search';
    }

    function schedule() {
      clearTimeout(timer);
      currentPage = 1;
      timer = setTimeout(() => load().catch(error => {
        meta.textContent = error.message;
        refresh.disabled = false;
        refresh.textContent = 'Search';
      }), 250);
    }

    input.addEventListener('input', schedule);
    refresh.addEventListener('click', () => {
      currentPage = 1;
      load().catch(error => meta.textContent = error.message);
    });
    bottomPager.addEventListener('click', event => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const page = Number(target.dataset.page || 0);
      if (!Number.isFinite(page) || page <= 0) return;
      currentPage = page;
      scrollResultsToTop();
      load().catch(error => meta.textContent = error.message);
    });
    bottomPager.addEventListener('change', event => {
      const target = event.target;
      if (!(target instanceof HTMLSelectElement) || target.dataset.pageSize === undefined) return;
      pageSize = target.value || '250';
      currentPage = 1;
      scrollResultsToTop();
      load().catch(error => meta.textContent = error.message);
    });
    load().catch(error => {
      meta.textContent = error.message;
      refresh.disabled = false;
      refresh.textContent = 'Search';
    });
  </script>
</body>
</html>
