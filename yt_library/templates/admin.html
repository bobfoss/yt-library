<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YT Library Admin</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --panel: #fffaf2;
      --ink: #22201d;
      --muted: #6b655c;
      --line: #ded6cb;
      --accent: #0b7285;
      --accent-soft: #d7f2f4;
      --warn: #9a3412;
      --ok: #166534;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161513;
        --panel: #211f1b;
        --ink: #f4efe7;
        --muted: #b8afa3;
        --line: #39342d;
        --accent: #67d8e6;
        --accent-soft: #173b40;
        --warn: #f4a261;
        --ok: #86efac;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); }
    main { width: 100%; margin: 0 auto; padding: 24px; }
    header { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    h1 { font-size: 28px; margin: 0; }
    h2 { font-size: 20px; margin: 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .workstreams { display: grid; gap: 24px; margin-bottom: 18px; }
    .workstream { border-top: 1px solid var(--line); padding-top: 18px; }
    .workstream-header { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; margin-bottom: 12px; }
    .workstream-header .status { justify-content: flex-end; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 12px; }
    .panel { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 14px; }
    .metric { color: var(--muted); font-size: 13px; }
    .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
    .controls { display: flex; flex-wrap: wrap; align-items: end; gap: 12px; margin: 12px 0 18px; }
    label { color: var(--muted); display: grid; gap: 5px; font-size: 13px; }
    input { border: 1px solid var(--line); background: var(--bg); color: var(--ink); border-radius: 6px; padding: 8px 10px; font: inherit; width: 120px; }
    .wide-input { width: min(720px, calc(100vw - 360px)); }
    label.checkbox { display: flex; flex-direction: row; align-items: center; gap: 7px; padding-bottom: 8px; }
    label.checkbox input { width: auto; }
    button { border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 6px; padding: 9px 12px; font: inherit; cursor: pointer; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.danger { background: #b91c1c; border-color: #dc2626; color: #fff; }
    button.danger:hover { background: #dc2626; color: #fff; }
    button:hover { background: var(--accent-soft); color: var(--ink); }
    .status { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); font-size: 14px; }
    .badge { border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px; }
    .running { color: var(--ok); }
    .warn { color: var(--warn); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px 6px; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 600; }
    .queue-title { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; margin-bottom: 8px; }
    .queue-title h2 { font-size: 16px; margin: 0; }
    .queue-title span { color: var(--muted); font-size: 13px; }
    .queue-scroll { max-height: 360px; overflow: auto; }
    .time-col { width: 150px; }
    .level-col { width: 110px; }
    .video-col { width: 150px; }
    .subject-col { width: 290px; }
    .worker-col { width: 90px; }
    .action-col { width: 100px; }
    .time-cell { white-space: nowrap; }
    .logs { max-height: 430px; overflow: auto; }
    .message { overflow-wrap: anywhere; white-space: pre-line; }
    @media (max-width: 700px) {
      main { padding: 16px; }
      header, .workstream-header { display: block; }
      .workstream-header .status { justify-content: flex-start; margin-top: 8px; }
      .wide-input { width: min(100%, 720px); }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>YT Library Admin</h1>
      <nav><a href="/">Playlists</a></nav>
    </header>

    <section class="workstreams">
      <section class="workstream">
        <div class="workstream-header">
          <h2>Metadata</h2>
          <div id="metadataRunStatus" class="status"></div>
        </div>
        <div class="controls">
          <label>Metadata stale days<input id="metadataStaleDays" type="number" min="0" step="1" value="30"></label>
          <label class="checkbox"><input id="metadataForce" type="checkbox">Refresh already fetched</label>
          <button id="fetchMetadata" class="primary" type="button">Fetch metadata</button>
        </div>
        <div class="grid" id="metadataCounts"></div>
      </section>

      <section class="workstream">
        <div class="workstream-header">
          <h2>Playlists</h2>
          <div id="playlistRunStatus" class="status"></div>
        </div>
        <div class="grid">
          <div class="panel"><div class="metric">Playlist count</div><div id="playlistRows" class="value">0</div></div>
          <div class="panel"><div class="metric">Distinct video IDs</div><div id="distinctVideos" class="value">0</div></div>
        </div>
        <div class="controls">
          <button id="scanPlaylists" class="primary" type="button">Scan all playlists</button>
          <button id="reconcilePlaylists" type="button">Reconcile playlists</button>
        </div>
      </section>

      <section class="workstream">
        <div class="workstream-header">
          <h2>History</h2>
          <div id="liveHistoryRunStatus" class="status"></div>
        </div>
        <div class="grid">
          <div class="panel"><div class="metric">History rows</div><div id="historyRows" class="value">0</div></div>
          <div class="panel"><div class="metric">History video IDs</div><div id="historyVideos" class="value">0</div></div>
          <div class="panel"><div class="metric">Fetched history rows</div><div id="liveHistoryRows" class="value">0</div></div>
          <div class="panel"><div class="metric">History fetch</div><div id="liveHistoryWorkerState" class="value">idle</div></div>
        </div>
        <div class="controls">
          <button id="startLiveHistory" class="primary" type="button">Fetch history</button>
          <button id="verifyLiveHistory" class="primary" type="button">Verify history</button>
          <button id="importTakeoutHistory" type="button">Import Takeout history</button>
          <button id="reconcileHistory" type="button">Reconcile history</button>
        </div>
      </section>

    </section>

    <section class="panel">
      <div class="queue-title"><h2>Worker queue</h2></div>
      <div class="grid">
        <div class="panel"><div class="metric">Queue</div><div id="commonQueueCount" class="value">0</div></div>
        <div class="panel"><div class="metric">Worker</div><div id="commonWorkerState" class="value">idle</div></div>
      </div>
      <div class="controls">
        <label>URL/video/channel/playlist ID<input id="providedQueueTarget" class="wide-input" type="text" placeholder="YouTube URL, local URL, video ID, channel ID, @handle, or playlist ID"></label>
        <button id="queueProvidedTarget" class="primary" type="button">Add to queue</button>
      </div>
      <div class="controls">
        <button id="startWorkerQueue" class="primary" type="button">Start queue</button>
        <button id="rebuildWorkerQueue" type="button">Rebuild queue</button>
        <button id="clearWorkerQueue" type="button">Clear queue</button>
        <button id="stopWorkerQueue" type="button">Stop queue</button>
        <button id="refresh" type="button">Refresh status</button>
      </div>
      <table>
        <colgroup>
          <col class="worker-col">
          <col>
          <col>
          <col>
          <col class="action-col">
        </colgroup>
        <thead><tr><th>Worker</th><th>Subject</th><th>Source</th><th>Details</th><th>Action</th></tr></thead>
      </table>
      <div class="queue-scroll" id="workerQueuePanel">
        <table><tbody id="workerQueueRows"></tbody></table>
      </div>
    </section>

    <section class="panel logs">
      <table>
        <colgroup>
          <col class="time-col">
          <col class="level-col">
          <col class="subject-col">
          <col>
        </colgroup>
        <thead><tr><th>Time</th><th>Level</th><th>Subject</th><th>Message</th></tr></thead>
        <tbody id="logs"></tbody>
      </table>
    </section>
  </main>
  <script>
    const fields = {
      playlistRows: document.getElementById('playlistRows'),
      distinctVideos: document.getElementById('distinctVideos'),
      historyRows: document.getElementById('historyRows'),
      historyVideos: document.getElementById('historyVideos'),
      liveHistoryRows: document.getElementById('liveHistoryRows'),
      metadataCounts: document.getElementById('metadataCounts'),
      logs: document.getElementById('logs'),
      providedQueueTarget: document.getElementById('providedQueueTarget'),
      metadataStaleDays: document.getElementById('metadataStaleDays'),
      metadataForce: document.getElementById('metadataForce'),
      commonQueueCount: document.getElementById('commonQueueCount'),
      commonWorkerState: document.getElementById('commonWorkerState'),
      liveHistoryWorkerState: document.getElementById('liveHistoryWorkerState'),
      playlistRunStatus: document.getElementById('playlistRunStatus'),
      metadataRunStatus: document.getElementById('metadataRunStatus'),
      liveHistoryRunStatus: document.getElementById('liveHistoryRunStatus'),
      stopWorkerQueue: document.getElementById('stopWorkerQueue'),
      workerQueueRows: document.getElementById('workerQueueRows'),
      workerQueuePanel: document.getElementById('workerQueuePanel'),
    };

    const queueState = {
      rows: [],
      total: 0,
    };

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function fmtTime(value) {
      if (!value) return '';
      return new Date(value * 1000).toLocaleString();
    }

    function workerSubject(row) {
      return row.playlist_title || row.current_title || row.video_id || row.channel_title || row.channel_id || row.playlist_id || row.subject_key || '';
    }

    function workerDetails(row) {
      if (row.worker_type === 'playlist') {
        return `${row.playlist_id || ''}\n${row.scan_status || 'unscanned'} ${row.video_count || 0}/${row.playlist_video_count || '?'}`;
      }
      if (row.worker_type === 'metadata') {
        return row.task_type === 'channel' ? (row.channel_id || '') : (row.current_title || '');
      }
      if (row.worker_type === 'placeholder') {
        return [row.video_id || '', row.current_title || ''].filter(Boolean).join('\n');
      }
      return row.current_title || row.task_type || '';
    }

    function queueScrollAnchor() {
      const panelTop = fields.workerQueuePanel.getBoundingClientRect().top;
      const row = [...fields.workerQueueRows.querySelectorAll('tr[data-queue-id]')]
        .find(candidate => candidate.getBoundingClientRect().bottom > panelTop);
      if (!row) return null;
      return {
        queueId: row.dataset.queueId,
        offset: row.getBoundingClientRect().top - panelTop,
      };
    }

    function restoreQueueScroll(anchor) {
      if (!anchor) return;
      const row = fields.workerQueueRows.querySelector(`tr[data-queue-id="${CSS.escape(anchor.queueId)}"]`);
      if (!row) return;
      const panelTop = fields.workerQueuePanel.getBoundingClientRect().top;
      fields.workerQueuePanel.scrollTop += row.getBoundingClientRect().top - panelTop - anchor.offset;
    }

    function renderQueue(preserveScroll = false) {
      const anchor = preserveScroll ? queueScrollAnchor() : null;
      if (!queueState.rows.length) {
        fields.workerQueueRows.innerHTML = '<tr><td colspan="5" class="message">No worker jobs queued.</td></tr>';
        return;
      }
      fields.workerQueueRows.innerHTML = queueState.rows.map(row => `
        <tr data-queue-id="${escapeHtml(row.queue_id || '')}">
          <td>${escapeHtml(row.worker_type || '')}</td>
          <td class="message">${escapeHtml(workerSubject(row))}</td>
          <td class="message">${escapeHtml([`${row.task_type || ''}${row.manual ? ' manual' : ''}`, row.source_key || ''].filter(Boolean).join('\n'))}</td>
          <td class="message">${escapeHtml(workerDetails(row))}</td>
          <td><button class="remove-queue-entry" type="button" data-queue-id="${escapeHtml(row.queue_id || '')}">Remove</button></td>
        </tr>
      `).join('');
      restoreQueueScroll(anchor);
    }

    function render(data) {
      fields.playlistRows.textContent = data.playlistCounts.total_playlists || 0;
      fields.distinctVideos.textContent = data.counts.distinct_playlist_videos || 0;
      fields.historyRows.textContent = data.counts.history_rows || 0;
      fields.historyVideos.textContent = data.counts.distinct_history_videos || 0;
      fields.liveHistoryRows.textContent = data.liveHistoryCounts?.live_rows || 0;
      fields.commonQueueCount.textContent = data.workerQueueCount || 0;
      const anyWorkerRunning = Boolean(data.workerQueueRunning || data.playlistScanRunning || data.metadataRunning || data.liveHistoryRunning);
      const commonWorkerRunning = Boolean(data.workerQueueRunning || data.playlistScanRunning || data.metadataRunning || data.liveHistoryRunning);
      fields.commonWorkerState.textContent = commonWorkerRunning ? 'running' : 'idle';
      fields.commonWorkerState.className = `value ${commonWorkerRunning ? 'running' : ''}`;
      fields.liveHistoryWorkerState.textContent = data.liveHistoryRunning ? 'running' : 'idle';
      fields.liveHistoryWorkerState.className = `value ${data.liveHistoryRunning ? 'running' : ''}`;
      fields.stopWorkerQueue.classList.toggle('danger', anyWorkerRunning);

      function runHtml(run, label) {
        return run ? `
          <span class="badge">${escapeHtml(label)}</span>
          <span class="badge">${escapeHtml(run.status)}</span>
          <span class="badge">${run.processed}/${run.total} processed</span>
          <span class="badge">${run.found} ok</span>
          <span class="badge ${run.failed ? 'warn' : ''}">${run.failed} failed</span>
          <span class="badge">${escapeHtml(run.message)}</span>
          <span class="badge">Started ${fmtTime(run.started_at)}</span>
        ` : `<span class="badge">${escapeHtml(label)}: no runs yet</span>`;
      }

      fields.playlistRunStatus.innerHTML = runHtml(data.latestPlaylistScanRun, 'Playlist scan');
      fields.metadataRunStatus.innerHTML = runHtml(data.latestMetadataRun, 'Metadata');
      fields.liveHistoryRunStatus.innerHTML = runHtml(data.latestLiveHistoryRun, 'History');

      const channelCounts = data.channelCounts || {};
      const channelCards = [
        { label: 'Channels', count: channelCounts.total || 0 },
        { label: 'Channel thumbs cached', count: channelCounts.thumbnail_cached || 0 },
        { label: 'Channel thumbs missing', count: channelCounts.thumbnail_missing || 0 },
        { label: 'Channels terminated', count: channelCounts.terminated || 0 },
        { label: 'Channel URLs missing', count: channelCounts.url_missing || 0 },
      ];
      const videoMetadataCards = (data.metadataCounts || []).map(row => ({
        label: `Video metadata: ${row.fetch_status || 'blank'}`,
        count: row.count,
      }));
      fields.metadataCounts.replaceChildren(...[...channelCards, ...videoMetadataCards].map(row => {
        const div = document.createElement('div');
        div.className = 'panel';
        div.innerHTML = `<div class="metric">${escapeHtml(row.label)}</div><div class="value">${row.count}</div>`;
        return div;
      }));

      hydrateQueue(data.workerQueue || [], data.workerQueueCount || 0);

      const logs = [
        ...(data.playlistScanLogs || []).map(log => ({ ...log, subject_id: log.playlist_id, source: 'playlist' })),
        ...(data.metadataLogs || []).map(log => ({
          ...log,
          subject_id: log.video_id,
          source: String(log.level || '').startsWith('placeholder ') ? 'placeholder' : 'metadata',
          level: String(log.level || '').replace(/^placeholder\s+/, ''),
        })),
        ...(data.liveHistoryLogs || []).map(log => ({ ...log, subject_id: log.video_id, source: 'history' })),
      ].sort((a, b) => (b.created_at - a.created_at) || ((b.id || 0) - (a.id || 0))).slice(0, 120);
      fields.logs.innerHTML = logs.map(log => `
        <tr>
          <td class="time-cell">${fmtTime(log.created_at)}</td>
          <td>${escapeHtml(log.source)} ${escapeHtml(log.level)}</td>
          <td class="time-cell">${escapeHtml(log.subject_id || '')}</td>
          <td class="message">${escapeHtml(log.message)}</td>
        </tr>
      `).join('');
    }

    let statusRequest = null;

    function hydrateQueue(rows, total) {
      queueState.total = total;
      queueState.rows = rows;
      renderQueue(true);
    }

    function resetQueueState() {
      queueState.rows = [];
      queueState.total = 0;
    }

    let operationPollTimer = null;
    let operationPollsRemaining = 0;

    function scheduleActionPolls() {
      operationPollsRemaining = Math.max(operationPollsRemaining, 10);
      if (operationPollTimer !== null) return;
      const poll = () => {
        operationPollTimer = null;
        loadStatus({ force: true })
          .catch(error => { fields.playlistRunStatus.textContent = error.message; })
          .finally(() => {
            operationPollsRemaining -= 1;
            if (operationPollsRemaining > 0) {
              operationPollTimer = window.setTimeout(poll, 1000);
            }
          });
      };
      operationPollTimer = window.setTimeout(poll, 500);
    }

    async function loadStatus(options = {}) {
      const force = Boolean(options.force);
      if (statusRequest && !force) return statusRequest;
      if (statusRequest && force) {
        try {
          await statusRequest;
        } catch (error) {
          // A forced action refresh should still get its own current read.
        }
      }
      statusRequest = (async () => {
        const endpoint = '/api/admin/status';
        const response = await fetch(endpoint, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Status failed: ${response.status}`);
        render(await response.json());
      })();
      try {
        await statusRequest;
      } finally {
        statusRequest = null;
      }
    }

    async function post(path, params = {}) {
      const response = await fetch(`${path}?${new URLSearchParams(params)}`, { method: 'POST' });
      if (!response.ok) throw new Error(`Request failed: ${response.status}`);
      const payload = await response.json();
      resetQueueState();
      await loadStatus({ force: true });
      scheduleActionPolls();
      return payload;
    }

    async function stopWorkersNow() {
      fields.commonWorkerState.textContent = 'stopping';
      fields.stopWorkerQueue.classList.add('danger');
      const response = await fetch('/api/admin/queue/stop', { method: 'POST' });
      if (!response.ok) throw new Error(`Request failed: ${response.status}`);
      scheduleActionPolls();
      return response.json();
    }

    document.getElementById('scanPlaylists').addEventListener('click', () => post('/api/admin/playlists/start').catch(error => alert(error.message)));
    document.getElementById('fetchMetadata').addEventListener('click', () => post('/api/admin/metadata/start', {
      stale_days: fields.metadataStaleDays.value,
      force: fields.metadataForce.checked ? '1' : '0',
    }).catch(error => alert(error.message)));
    document.getElementById('queueProvidedTarget').addEventListener('click', async () => {
      const target = fields.providedQueueTarget.value.trim();
      if (!target) {
        alert('Enter a YouTube URL, local URL, video ID, channel ID, @handle, or playlist ID.');
        return;
      }
      try {
        await post('/api/admin/queue/add-target', { target });
        fields.providedQueueTarget.value = '';
        await post('/api/admin/queue/start');
      } catch (error) {
        alert(error.message);
      }
    });
    fields.workerQueueRows.addEventListener('click', event => {
      const button = event.target.closest('.remove-queue-entry');
      if (!button) return;
      const queueId = button.dataset.queueId || '';
      if (!queueId) return;
      post('/api/admin/queue/remove', { queue_id: queueId }).catch(error => alert(error.message));
    });
    document.getElementById('startLiveHistory').addEventListener('click', () => post('/api/admin/live-history/start').catch(error => alert(error.message)));
    document.getElementById('verifyLiveHistory').addEventListener('click', () => {
      if (!confirm('Verify the full YouTube history? This may run for a long time, but existing fetched history will be kept.')) return;
      post('/api/admin/live-history/verify').catch(error => alert(error.message));
    });
    document.getElementById('importTakeoutHistory').addEventListener('click', () => {
      if (!confirm('Import Takeout watch history and rebuild reconciliation? Existing Takeout rows for this history key will be replaced.')) return;
      post('/api/admin/history/import-takeout').catch(error => alert(error.message));
    });
    document.getElementById('reconcileHistory').addEventListener('click', () => post('/api/admin/history/reconcile').catch(error => alert(error.message)));
    document.getElementById('reconcilePlaylists').addEventListener('click', () => post('/api/admin/playlists/reconcile').catch(error => alert(error.message)));
    document.getElementById('startWorkerQueue').addEventListener('click', () => post('/api/admin/queue/start').catch(error => alert(error.message)));
    document.getElementById('rebuildWorkerQueue').addEventListener('click', () => post('/api/admin/queue/rebuild').catch(error => alert(error.message)));
    document.getElementById('clearWorkerQueue').addEventListener('click', () => {
      if (!confirm('Clear the worker queue? This will remove all pending metadata, playlist, and history jobs.')) return;
      post('/api/admin/queue/clear').catch(error => alert(error.message));
    });
    document.getElementById('stopWorkerQueue').addEventListener('click', () => stopWorkersNow().catch(error => alert(error.message)));
    document.getElementById('refresh').addEventListener('click', () => loadStatus({ force: true }).catch(error => alert(error.message)));
    loadStatus({ force: true })
      .catch(error => { fields.playlistRunStatus.textContent = error.message; });
    setInterval(() => {
      loadStatus().catch(error => { fields.playlistRunStatus.textContent = error.message; });
    }, 5000);
  </script>
</body>
</html>
